syntax = "proto3";

package emptydea.game_control.resources_control;

option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/game_control/resources_control;resources_control_pb";

import "packet/packet.proto";

// SendPacketRequest 是发送结构化 Minecraft 数据包的请求。
message SendPacketRequest {
  // Packet 是要发送的结构化数据包。
  mousetunnel.minecraft.protocol.packet.packet.Packet Packet = 1;
}

// SendPacketResponse 是发送数据包后的空响应。
message SendPacketResponse {}

// EncodePacketRequest 是将结构化数据包编码为字节的请求。
message EncodePacketRequest {
  // Packet 是要编码的结构化数据包。
  mousetunnel.minecraft.protocol.packet.packet.Packet Packet = 1;
  // Protocol 是目标 Minecraft 协议版本。
  int32 Protocol = 2;
  // ShieldID 是网易租赁服加密或屏蔽上下文 ID。
  int32 ShieldID = 3;
}

// EncodePacketResponse 是数据包编码结果。
message EncodePacketResponse {
  // PacketID 是编码后的 Minecraft 数据包 ID。
  uint32 PacketID = 1;
  // Payload 是编码后的数据包负载字节。
  bytes Payload = 2;
}

// DecodePacketRequest 是将字节解码为结构化数据包的请求。
message DecodePacketRequest {
  // PacketID 是 Minecraft 数据包 ID。
  uint32 PacketID = 1;
  // Payload 是数据包负载字节。
  bytes Payload = 2;
  // Protocol 是来源 Minecraft 协议版本。
  int32 Protocol = 3;
  // ShieldID 是网易租赁服加密或屏蔽上下文 ID。
  int32 ShieldID = 4;
}

// DecodePacketResponse 是数据包解码结果。
message DecodePacketResponse {
  // Packet 是解码后的结构化数据包。
  mousetunnel.minecraft.protocol.packet.packet.Packet Packet = 1;
}

// PacketService 封装原始 Minecraft 数据包发送、编码和解码。
service PacketService {
  // SendPacket 向服务端发送一个结构化数据包。
  rpc SendPacket(SendPacketRequest) returns (SendPacketResponse);
  // EncodePacket 将结构化数据包编码为 Minecraft 数据包字节。
  rpc EncodePacket(EncodePacketRequest) returns (EncodePacketResponse);
  // DecodePacket 将 Minecraft 数据包字节解码为结构化数据包。
  rpc DecodePacket(DecodePacketRequest) returns (DecodePacketResponse);
}
