  // DstSlot 是背包目标槽位 ID。
  uint32 DstSlot = 2;
  // Count 是移动的物品数量。
  uint32 Count = 3;
}

// SwapItemOperation 是交换两个显式槽位物品的操作。
message SwapItemOperation {
  // Source 是来源槽位。
  emptydea.game_control.resources_control.SlotLocation Source = 1;
  // Destination 是目标槽位。
  emptydea.game_control.resources_control.SlotLocation Destination = 2;
}

// SwapBetweenInventoryOperation 是交换背包内两个槽位物品的操作。
message SwapBetweenInventoryOperation {
  // SrcSlot 是来源槽位 ID。
  uint32 SrcSlot = 1;
  // DstSlot 是目标槽位 ID。
  uint32 DstSlot = 2;
}

// SwapInventoryBetweenContainerOperation 是交换背包和已打开容器中物品的操作。
