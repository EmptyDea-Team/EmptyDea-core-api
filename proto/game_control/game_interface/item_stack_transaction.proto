}

// DropItemOperation 是从显式槽位丢弃物品的操作。
message DropItemOperation {
  // Slot 是要丢弃物品的槽位。
  emptydea.game_control.resources_control.SlotLocation Slot = 1;
  // Count 是丢弃的物品数量。
  uint32 Count = 2;
}

// DropInventoryItemOperation 是从背包槽位丢弃物品的操作。
message DropInventoryItemOperation {
