  // Count 是丢弃的物品数量。
  uint32 Count = 2;
}

// DropContainerItemOperation 是从已打开容器槽位丢弃物品的操作。
message DropContainerItemOperation {
  // Slot 是要丢弃物品的容器槽位 ID。
