syntax = "proto3";

package emptydea.game_control.game_interface;

option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/game_control/game_interface;game_interface_pb";

import "game_control/resources_control/inventory.proto";
import "google/protobuf/struct.proto";
import "item.proto";
import "item_stack.proto";
import "packet/item_stack_request.proto";

// ExpectedNewItem 描述单个物品堆栈在经历一次物品堆栈操作后，
// 其最终应当拥有的一些数据信息。应当说明的是，这些数据信息不
// 会由服务器告知，它应当是客户端内部处理的。
message ExpectedNewItem {
  // ItemType 指示我们应当如何更新物品的一些基本字段。
  ItemNewType ItemType = 1;
  // BlockRuntimeID 指示我们应当如何更新物品对应的方块运行时 ID 数据。
  ItemNewBlockRuntimeID BlockRuntimeID = 2;
  // NBT 指示我们应当如何更新物品的 NBT 字段。
  ItemNewNBTData NBT = 3;
  // Component 指示我们应该如何更新物品的 Legacy 物品组件字段。
  ItemNewComponent Component = 4;
}

// ItemNewType 描述物品的一些基本字段应如何更新。
message ItemNewType {
  // UseNetworkID 指示是否需要采用下方的 NetworkID 更新物品的数值网络 ID。
  bool UseNetworkID = 1;
  // NetworkID 是该物品的数值网络 ID，它在单个 MC 版本中不会变化。
  // 它可正亦可负，具体取决于其所关注的物品堆栈实例。
  int32 NetworkID = 2;
  // UseMetadata 指示是否需要采用下方的 Metadata 更新物品的元数据。
  bool UseMetadata = 3;
  // Metadata 指示这跟物品的新元数据。特别地，耐久数据不在本处设置。
  uint32 Metadata = 4;
}

// ItemNewBlockRuntimeID 描述物品对应的方块运行时数据应该如何更新。
message ItemNewBlockRuntimeID {
  // UseBlockRuntimeID 指示是否需要采用下方的 BlockRuntimeID 更新物品的方块运行时 ID。
  bool UseBlockRuntimeID = 1;
  // BlockRuntimeID 指示这个物品获得的新方块运行时 ID 数据。
  int32 BlockRuntimeID = 2;
}

// ItemNewNBTData 描述物品的新 NBT 字段如何更新。
message ItemNewNBTData {
  // UseNBTData 指示是否需要采用下方的 NBTData 更新物品的 NBT 数据。
  bool UseNBTData = 1;
  // UseOriginDamage 指示在采用下方的 NBTData 时是否保留原有的 Damage 标签的数据。
  bool UseOriginDamage = 2;
  // NBTData 指示经过相应的物品堆栈操作后，其 NBT 字段的最终状态。
  map<string, google.protobuf.Value> NBTData = 3;
  // ChangeRepairCost 指示是否需要更新物品的 RepairCost 字段。
  bool ChangeRepairCost = 4;
  // RepairCostDelta 是要修改的 RepairCost 的增量，可以为负。
  int32 RepairCostDelta = 5;
  // ChangeDamage 指示是否需要更新的 Damage 字段。
  bool ChangeDamage = 6;
  // DamageDelta 是要修改的 Damage 的增量，可以为负。
  int32 DamageDelta = 7;
}

// ItemNewComponent 描述物品的 Legacy 物品组件应当如何更新。
message ItemNewComponent {
  // UseCanPlaceOn 指示是否需要采用下方的 CanPlaceOn 更新物品的 can place on 物品组件。
  bool UseCanPlaceOn = 1;
  // CanPlaceOn 指示物品在 can place on 上的新物品组件数据。
  repeated string CanPlaceOn = 2;
  // UseCanDestroy 指示是否需要采用下方的 CanDestroy 更新物品的 can destroy 物品组件。
  bool UseCanDestroy = 3;
  // CanDestroy 指示物品在 can destroy 上的新物品组件数据。
  repeated string CanDestroy = 4;
}

// OpenTransactionRequest 是创建物品栈事务的空请求。
message OpenTransactionRequest {}

// OpenTransactionResponse 是新建物品栈事务的响应。
message OpenTransactionResponse {
  // TransactionID 是后续追加操作和提交事务使用的事务 ID。
  string TransactionID = 1;
}

// TransactionRef 引用一个已打开的物品栈事务。
message TransactionRef {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
}

// TransactionActionResponse 是向事务追加操作后的响应。
message TransactionActionResponse {
  // TransactionID 是被修改的事务 ID。
  string TransactionID = 1;
}

// MoveItemRequest 是在两个显式槽位之间移动或交换物品的请求。
message MoveItemRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Source 是来源槽位。
  emptydea.game_control.resources_control.SlotLocation Source = 2;
  // Destination 是目标槽位。
  emptydea.game_control.resources_control.SlotLocation Destination = 3;
  // Count 是移动的物品数量。
  uint32 Count = 4;
}

// MoveBySlotRequest 是在默认窗口语义下按槽位移动或交换物品的请求。
message MoveBySlotRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // SrcSlot 是来源槽位 ID。
  uint32 SrcSlot = 2;
  // DstSlot 是目标槽位 ID。
  uint32 DstSlot = 3;
  // Count 是移动的物品数量。
  uint32 Count = 4;
}

// DropItemRequest 是从显式槽位丢弃物品的请求。
message DropItemRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Slot 是要丢弃物品的槽位。
  emptydea.game_control.resources_control.SlotLocation Slot = 2;
  // Count 是丢弃的物品数量。
  uint32 Count = 3;
}

// DropSlotRequest 是按默认窗口槽位丢弃物品的请求。
message DropSlotRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Slot 是要丢弃物品的槽位 ID。
  uint32 Slot = 2;
  // Count 是丢弃的物品数量。
  uint32 Count = 3;
}

// CreativeItemRequest 是从创造物品表取出物品的请求。
message CreativeItemRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // CreativeItemNetworkID 是创造物品网络 ID。
  uint32 CreativeItemNetworkID = 2;
  // Destination 是目标槽位。
  emptydea.game_control.resources_control.SlotLocation Destination = 3;
  // Count 是移动的物品数量。
  uint32 Count = 4;
}

// RenameItemRequest 是重命名显式槽位物品的请求。
message RenameItemRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Slot 是要重命名物品所在槽位。
  emptydea.game_control.resources_control.SlotLocation Slot = 2;
  // NewName 是新的物品显示名。
  string NewName = 3;
}

// RenameSlotRequest 是按默认窗口槽位重命名物品的请求。
message RenameSlotRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Slot 是要重命名物品所在槽位 ID。
  uint32 Slot = 2;
  // NewName 是新的物品显示名。
  string NewName = 3;
}

// LoomingRequest 是追加织布机图案操作的请求。
message LoomingRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // PatternName 是织布时使用的图案。
  string PatternName = 2;
  // Pattern 是图案物品槽位。
  emptydea.game_control.resources_control.SlotLocation Pattern = 3;
  // Banner 是旗帜物品槽位。
  emptydea.game_control.resources_control.SlotLocation Banner = 4;
  // Dye 是染料物品槽位。
  emptydea.game_control.resources_control.SlotLocation Dye = 5;
  // ResultItem 指示期望得到的旗帜的部分数据。
  ExpectedNewItem ResultItem = 6;
}

// CraftingRequest 是追加合成操作的请求。
message CraftingRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // RecipeNetworkID 是合成配方网络 ID。
  uint32 RecipeNetworkID = 2;
  // ResultSlotID 是合成后物品应当放置的位置。
  uint32 ResultSlotID = 3;
  // ResultCount 是合成后所得物品的数量。
  uint32 ResultCount = 4;
  // ResultItem 是合成后物品的最终数据。
  ExpectedNewItem ResultItem = 5;
}

// TrimmingRequest 是追加锻造台纹饰操作的请求。
message TrimmingRequest {
  // TransactionID 是目标事务 ID。
  string TransactionID = 1;
  // Input 是被纹饰的装备槽位。
  emptydea.game_control.resources_control.SlotLocation Input = 2;
  // Material 是纹饰材料槽位。
  emptydea.game_control.resources_control.SlotLocation Material = 3;
  // Template 是纹饰模板槽位。
  emptydea.game_control.resources_control.SlotLocation Template = 4;
  // ResultItem 指示期望得到的锻造结果数据。
  ExpectedNewItem ResultItem = 5;
}

// MoveItemOperation 是在两个显式槽位之间移动物品的操作。
message MoveItemOperation {
  // Source 是来源槽位。
  emptydea.game_control.resources_control.SlotLocation Source = 1;
  // Destination 是目标槽位。
  emptydea.game_control.resources_control.SlotLocation Destination = 2;
  // Count 是移动的物品数量。
