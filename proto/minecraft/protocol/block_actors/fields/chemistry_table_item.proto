syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.fields.chemistry_table_item;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors/fields;fields";

// ChemistryTableItem 描述化合物创建器存放的物品。
//
// ChemistryTableItem describes the item stored in a chemistry table.
message ChemistryTableItem {
  // TAG_Int(4) = 0
  int32 ItemId = 1;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 ItemAux = 2;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 ItemStack = 3;
}

