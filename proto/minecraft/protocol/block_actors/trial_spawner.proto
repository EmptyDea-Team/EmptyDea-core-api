syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.trial_spawner;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/fields/trial_spawner.proto";
import "block_actors/general_actors/block_actor.proto";
import "google/protobuf/struct.proto";

// TrialSpawner 描述试炼刷怪笼方块实体。
//
// TrialSpawner describes the trial spawner block actor.
message TrialSpawner {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // Not used; TAG_Compound(10)
  .mousetunnel.minecraft.protocol.block_actors.fields.trial_spawner.TrialSpawnerConfig NormalConfig = 2;
  // Not used; TAG_Compound(10)
  .mousetunnel.minecraft.protocol.block_actors.fields.trial_spawner.TrialSpawnerConfig OminousConfig = 3;
  // Not used; TAG_Compound(10)
  // Go type: *fields.TrialSpawnerSpawnData
  .mousetunnel.minecraft.protocol.block_actors.fields.trial_spawner.TrialSpawnerSpawnData SpawnData = 4;
  // Not used; TAG_Int(3) = 14
  int32 RequiredPlayerRange = 5;
  // Not used; TAG_List[TAG_Compound] (9[10]) = []
  // Go type: []any
  repeated google.protobuf.Value RegisteredPlayers = 6;
  // Not used; TAG_List[TAG_Compound] (9[10]) = []
  // Go type: []any
  repeated google.protobuf.Value CurrentMobs = 7;
  // Not used; TAG_Long(4) = 0
  int64 NextMobSpawnsAt = 8;
  // Not used; TAG_Long(4) = 0
  int64 CooldownEndAt = 9;
  // Not used; TAG_String(8)
  // Go type: *string
  string SelectedLootTable = 10;
}

