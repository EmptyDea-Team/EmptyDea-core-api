syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.general_actors.sign_block_actor;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors/general_actors;general_actors";

import "block_actors/fields/sign_text.proto";
import "block_actors/general_actors/block_actor.proto";

// SignBlockActor 描述各类告示牌的通用字段。
//
// SignBlockActor describes common fields shared by sign block actors.
message SignBlockActor {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_Compound(10)
  .mousetunnel.minecraft.protocol.block_actors.fields.sign_text.SignText BackText = 2;
  // TAG_Compound(10)
  .mousetunnel.minecraft.protocol.block_actors.fields.sign_text.SignText FrontText = 3;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 IsWaxed = 4;
}

