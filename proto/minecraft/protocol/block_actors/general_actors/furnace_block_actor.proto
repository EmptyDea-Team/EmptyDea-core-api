syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.general_actors.furnace_block_actor;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors/general_actors;general_actors";

import "block_actors/general_actors/block_actor.proto";
import "google/protobuf/struct.proto";

// FurnaceBlockActor 描述熔炉、高炉、烟熏炉的通用字段。
//
// FurnaceBlockActor describes common fields shared by furnaces, blast furnaces, and smokers.
message FurnaceBlockActor {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_String(8) = ""
  string PrivateUniqueID = 2;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 BurnDuration = 3;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 BurnTime = 4;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 CookTime = 5;
  // TAG_List[TAG_Compound] (9[10])
  // Go type: []any
  repeated google.protobuf.Value Items = 6;
  // TAG_Int(4) = 0
  int32 StoredXPInt = 7;
}

