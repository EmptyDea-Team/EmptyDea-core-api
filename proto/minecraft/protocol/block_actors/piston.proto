syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.piston;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";
import "google/protobuf/struct.proto";

// PistonArm 描述活塞臂方块实体。
//
// PistonArm describes the piston arm block actor.
message PistonArm {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_List[TAG_Int] (9[4])
  // Go type: []any
  repeated google.protobuf.Value AttachedBlocks = 2;
  // TAG_List[TAG_Int] (9[4])
  // Go type: []any
  repeated google.protobuf.Value BreakBlocks = 3;
  // TAG_Float(6) = 0
  // Go type: float32
  float LastProgress = 4;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 NewState = 5;
  // TAG_Float(6) = 0
  // Go type: float32
  float Progress = 6;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 State = 7;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 Sticky = 8;
}

