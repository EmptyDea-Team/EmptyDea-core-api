syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.cauldron;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";
import "google/protobuf/struct.proto";

// Cauldron 描述炼药锅方块实体。
//
// Cauldron describes the cauldron block actor.
message Cauldron {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_List[TAG_Compound] (9[10])
  // Go type: []any
  repeated google.protobuf.Value Items = 2;
  // TAG_Short(3) = -1
  // Go type: int16
  int32 PotionId = 3;
  // TAG_Short(3) = -1
  // Go type: int16
  int32 PotionType = 4;
  // TAG_Int(4) = 0
  // Go type: *int32
  int32 CustomColor = 5;
}

