syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.nether_reactor;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";

// NetherReactor 描述下界反应核方块实体。
//
// NetherReactor describes the nether reactor block actor.
message NetherReactor {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 HasFinished = 2;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 IsInitialized = 3;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 Progress = 4;
}

