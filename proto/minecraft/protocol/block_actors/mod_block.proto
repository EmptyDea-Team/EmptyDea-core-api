syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.mod_block;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";

// ModBlock 描述网易特有方块，可能被用于储存模组的自定义数据方块实体。
//
// ModBlock describes the NetEase-specific block that may store custom add-on data block actor.
message ModBlock {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 Tick = 2;
  // TAG_Byte(1) = 1
  // Go type: byte
  uint32 Movable = 3;
  // TAG_Int(4) = 0
  int32 ExData = 4;
  // TAG_String(8) = ""
  string BlockName = 5;
  // TAG_Long(5) = 0
  int64 UniqueId = 6;
  // TAG_Byte(1) = 0
  // Go type: byte
  uint32 TickClient = 7;
}

