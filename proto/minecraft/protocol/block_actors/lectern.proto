syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.lectern;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";
import "nbt_item.proto";

// Lectern 描述讲台方块实体。
//
// Lectern describes the lectern block actor.
message Lectern {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_Compound(10)
  // Go type: *protocol.Item
  .mousetunnel.minecraft.protocol.nbt_item.Item Book = 2;
  // TAG_Byte(1) = 0
  // Go type: *byte
  uint32 HasBook = 3;
  // TAG_Int(4) = 0
  // Go type: *int32
  int32 Page = 4;
  // TAG_Int(4) = 1
  // Go type: *int32
  int32 TotalPages = 5;
}

