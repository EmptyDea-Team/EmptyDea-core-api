syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.brewing_stand;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";
import "google/protobuf/struct.proto";

// BrewingStand 描述酿造台方块实体。
//
// BrewingStand describes the brewing stand block actor.
message BrewingStand {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 CookTime = 2;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 FuelAmount = 3;
  // TAG_Short(3) = 0
  // Go type: int16
  int32 FuelTotal = 4;
  // TAG_List[TAG_Compound] (9[10])
  // Go type: []any
  repeated google.protobuf.Value Items = 5;
}

