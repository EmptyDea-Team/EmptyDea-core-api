syntax = "proto3";

package mousetunnel.minecraft.protocol.block_actors.skull;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/block_actors;block_actors";

import "block_actors/general_actors/block_actor.proto";

// Skull 描述头颅方块实体。
//
// Skull describes the skull block actor.
message Skull {
  .mousetunnel.minecraft.protocol.block_actors.general_actors.block_actor.BlockActor BlockActor = 1;
  // * TAG_Byte(1) = 0
  // Go type: uint8
  uint32 DoingAnimation = 2;
  // TAG_Int(4) = 0
  int32 MouthTickCount = 3;
  // TAG_Float(6) = 0
  // Go type: float32
  float Rotation = 4;
  // TAG_Byte(1) = 0
  // Go type: uint8
  uint32 SkullType = 5;
}

