// MemoryCategoryCounter 表示特定类别的内存使用计数器。
//
// MemoryCategoryCounter represents a memory usage counter for a specific category.
//
// Added: v1.26.0
message MemoryCategoryCounter {
  // Category 是内存类别，应为上方 MemoryCategory 常量之一。
  //
  // Category is the memory category. It is one of the MemoryCategory constants above.
  //
  // Added: v1.26.0
  // Go type: uint8
  uint32 Category = 1;
  // Bytes 是该类别使用的字节数。
  //
  // Bytes is the number of bytes used by this category.
  //
  // Added: v1.26.0
  uint64 Bytes = 2;
}

// EntityDiagnosticTimingInfo 表示特定实体类型的诊断信息。
//
// EntityDiagnosticTimingInfo represents diagnostics for a specific entity type.
//
// Added: v1.26.20
message EntityDiagnosticTimingInfo {
  // DisplayName 是该计时条目要显示的名称。
  //
  // DisplayName is the name to display for this timing entry.
  //
  // Added: v1.26.20
  string DisplayName = 1;
  // Entity 是正在计时实体的标识符。
  //
  // Entity is the identifier of the entity that is being timed.
  //
  // Added: v1.26.20
  string Entity = 2;
  // DurationNanos 是该计时条目的持续时间，以纳秒为单位。
  //
  // DurationNanos is how long the timing entry lasted, in nanoseconds.
  //
  // Added: v1.26.20
  uint64 DurationNanos = 3;
  // PercentOfTotal 是该计时条目相对于其他条目所使用时间的百分比。
  //
  // PercentOfTotal is the percentage of time that this timing entry has used compared to others.
  //
  // Added: v1.26.20
  // Go type: byte
  uint32 PercentOfTotal = 4;
}

// SystemDiagnosticTimingInfo 表示特定系统索引的诊断信息。
//
// SystemDiagnosticTimingInfo represents diagnostics for a specific system index.
//
// Added: v1.26.20
message SystemDiagnosticTimingInfo {
  // DisplayName 是该计时条目要显示的名称。
  //
  // DisplayName is the name to display for this timing entry.
  //
  // Added: v1.26.20
  string DisplayName = 1;
  // SystemIndex 是正在计时系统的索引。
  //
  // SystemIndex is the index of the system that is being timed.
  //
  // Added: v1.26.20
  uint64 SystemIndex = 2;
  // DurationNanos 是该计时条目的持续时间，以纳秒为单位。
  //
  // DurationNanos is how long the timing entry lasted, in nanoseconds.
  //
  // Added: v1.26.20
  uint64 DurationNanos = 3;
  // PercentOfTotal 是该计时条目相对于其他条目所使用时间的百分比。
  //
  // PercentOfTotal is the percentage of time that this timing entry has used compared to others.
  //
  // Added: v1.26.20
  // Go type: byte
  uint32 PercentOfTotal = 4;
}

