// FullContainerName 包含在 StackRequestSlotInfo 中标识容器所需的信息。
//
// FullContainerName contains information required to identify a container in a StackRequestSlotInfo.
//
// Added: v1.21.20
message FullContainerName {
  // ContainerID 是槽位所在容器的 ID。
  //
  // ContainerID is the ID of the container that the slot was in.
  //
  // Added: v1.21.20
  // Go type: byte
  uint32 ContainerID = 1;
  // DynamicContainerID 是动态容器的 ID。如果容器不是动态容器，应保持该字段为空。
  // 非可选的 0 值会被视为非空。
  //
  // DynamicContainerID is the ID of the container if it is dynamic. If the container is not dynamic, this
  // field should be left empty. A non-optional value of 0 is assumed to be non-empty.
  //
  // Added: v1.21.20
  // Go type: Optional[uint32]
  .mousetunnel.minecraft.protocol.Optional DynamicContainerID = 2;
}

