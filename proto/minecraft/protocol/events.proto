syntax = "proto3";

package mousetunnel.minecraft.protocol.events;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol;protocol";

import "google/protobuf/struct.proto";

enum EventTypeEnum {
  EventTypeAchievementAwarded = 0;
  EventTypeEntityInteract = 1;
  EventTypePortalBuilt = 2;
  EventTypePortalUsed = 3;
  EventTypeMobKilled = 4;
  EventTypeCauldronUsed = 5;
  EventTypePlayerDied = 6;
  EventTypeBossKilled = 7;
  EventTypeAgentCommand = 8;
  EventTypeAgentCreated = 9;
  EventTypePatternRemoved = 10;
  EventTypeSlashCommandExecuted = 11;
  EventTypeFishBucketed = 12;
  EventTypeMobBorn = 13;
  EventTypePetDied = 14;
  EventTypeCauldronInteract = 15;
  EventTypeComposterInteract = 16;
  EventTypeBellUsed = 17;
  EventTypeEntityDefinitionTrigger = 18;
  EventTypeRaidUpdate = 19;
  EventTypeMovementAnomaly = 20;
  EventTypeMovementCorrected = 21;
  EventTypeExtractHoney = 22;
  EventTypeTargetBlockHit = 23;
  EventTypePiglinBarter = 24;
  EventTypePlayerWaxedOrUnwaxedCopper = 25;
  EventTypeCodeBuilderRuntimeAction = 26;
  EventTypeCodeBuilderScoreboard = 27;
  EventTypeStriderRiddenInLavaInOverworld = 28;
  EventTypeSneakCloseToSculkSensor = 29;
  EventTypeCarefulRestoration = 30;
  EventTypeItemUsed = 31;
}

// AchievementAwardedEvent 是成就事件发送的事件数据。
//
// AchievementAwardedEvent is the event data sent for achievements.
//
// Added: v1.17.10
message AchievementAwardedEvent {
  // AchievementID 是成就的 ID。
  //
  // AchievementID is the ID for the achievement.
  //
  // Added: v1.17.10
  // Go type: uint8
  uint32 AchievementID = 1;
}

// EntityInteractEvent 是实体交互事件发送的事件数据。
//
// EntityInteractEvent is the event data sent for entity interactions.
//
// Added: v1.17.10
message EntityInteractEvent {
  // InteractedEntityID 是被交互实体的唯一 ID。
  //
  // InteractedEntityID is the unique ID of the entity that was interacted with.
  //
  // Added: v1.17.10
  int64 InteractedEntityID = 1;
  // InteractionType 是发生的交互类型。
  //
  // InteractionType is the type of interaction that occurred.
  //
  // Added: v1.17.10
  // Go type: uint8
  uint32 InteractionType = 2;
  // InteractionEntityType 是被交互实体的实体类型运行时 ID。
  //
  // InteractionEntityType is the entity type runtime ID of the interacted entity.
  //
  // Added: v1.17.10
  int32 InteractionEntityType = 3;
  // EntityVariant 是被交互实体的变种值。
  //
  // EntityVariant is the variant value of the interacted entity.
  //
  // Added: v1.17.10
  int32 EntityVariant = 4;
  // EntityColour 是被交互实体的颜色变种；不适用时可忽略。
  //
  // EntityColour is the colour variant of the interacted entity, if applicable.
  //
  // Added: v1.17.10
  // Go type: uint8
  uint32 EntityColour = 5;
}

// PortalBuiltEvent 是传送门建造时发送的事件数据。
//
// PortalBuiltEvent is the event data sent when a portal is built.
//
// Added: v1.17.10
message PortalBuiltEvent {
  // DimensionID 是建造传送门所在维度的数字 ID。
  //
  // DimensionID is the numeric dimension ID where the portal was built.
  //
  // Added: v1.17.10
  int32 DimensionID = 1;
}

// PortalUsedEvent 是传送门被使用时发送的事件数据。
//
// PortalUsedEvent is the event data sent when a portal is used.
//
// Added: v1.17.10
message PortalUsedEvent {
  // FromDimensionID 是传送门传送的来源维度 ID。
  //
  // FromDimensionID is the source dimension ID of the portal transfer.
  //
  // Added: v1.17.10
  int32 FromDimensionID = 1;
  // ToDimensionID 是传送门传送的目标维度 ID。
  //
  // ToDimensionID is the destination dimension ID of the portal transfer.
  //
  // Added: v1.17.10
  int32 ToDimensionID = 2;
}

// MobKilledEvent 是生物被击杀时发送的事件数据。
//
// MobKilledEvent is the event data sent when a mob is killed.
//
// Added: v1.17.10
message MobKilledEvent {
  // KillerEntityUniqueID 是造成致命一击实体的唯一 ID。
  //
  // KillerEntityUniqueID is the unique ID of the entity that dealt the killing blow.
  //
  // Added: v1.17.10
  int64 KillerEntityUniqueID = 1;
  // VictimEntityUniqueID 是死亡实体的唯一 ID。
  //
  // VictimEntityUniqueID is the unique ID of the entity that died.
  //
  // Added: v1.17.10
  int64 VictimEntityUniqueID = 2;
  // KillerEntityType 是击杀者的实体类型运行时 ID。
  //
  // KillerEntityType is the entity type runtime ID of the killer.
  //
  // Added: v1.17.10
  int32 KillerEntityType = 3;
  // EntityDamageCause 是导致击杀的伤害原因。
  //
  // EntityDamageCause is the damage cause that led to the kill.
  //
  // Added: v1.17.10
  int32 EntityDamageCause = 4;
  // VillagerTradeTier 是村民交易等级；如果受害者不是交易实体，则为 -1。
  //
  // VillagerTradeTier is the villager trade tier, or -1 if the victim was not a trading actor.
  //
  // Added: v1.17.10
  int32 VillagerTradeTier = 5;
  // VillagerDisplayName 是村民名称；如果受害者不是交易实体，则为空。
  //
  // VillagerDisplayName is the villager name, or empty if the victim was not a trading actor.
  //
  // Added: v1.17.10
  string VillagerDisplayName = 6;
}

// CauldronUsedEvent 是炼药锅被使用时发送的事件数据。
//
// CauldronUsedEvent is the event data sent when a cauldron is used.
//
// Added: v1.17.10
message CauldronUsedEvent {
  // Colour 是与炼药锅内容关联的 ARGB 颜色值。
  //
  // Colour is the ARGB colour value associated with the cauldron contents.
  //
  // Added: v1.17.10
  uint32 Colour = 1;
  // PotionID 是与炼药锅内容关联的药水类型 ID。
  //
  // PotionID is the potion type ID associated with the cauldron contents.
  //
  // Added: v1.17.10
  // Go type: int16
  int32 PotionID = 2;
  // FillLevel 是该动作发生后炼药锅的填充等级。
  //
  // FillLevel is the fill level of the cauldron after the action.
  //
  // Added: v1.17.10
  // Go type: int16
  int32 FillLevel = 3;
}

// PlayerDiedEvent 是玩家死亡时发送的事件数据。
//
// PlayerDiedEvent is the event data sent when a player dies.
//
// Added: v1.17.10
message PlayerDiedEvent {
  // AttackerEntityID 是攻击实体的运行时 ID；没有攻击实体时可忽略。
  //
  // AttackerEntityID is the runtime ID of the attacking entity, if any.
  //
  // Added: v1.17.10
  int32 AttackerEntityID = 1;
  // AttackerVariant 是攻击者的变种值。
  //
  // AttackerVariant is the variant value of the attacker.
  //
  // Added: v1.17.10
  int32 AttackerVariant = 2;
  // EntityDamageCause 是导致玩家死亡的伤害原因。
  //
  // EntityDamageCause is the damage cause that killed the player.
  //
  // Added: v1.17.10
  int32 EntityDamageCause = 3;
  // InRaid 指定死亡是否发生在玩家参与袭击期间。
  //
  // InRaid specifies if the death occurred while the player was participating in a raid.
  //
  // Added: v1.19.21
  bool InRaid = 4;
}

// BossKilledEvent 是 boss 死亡时发送的事件数据。
//
// BossKilledEvent is the event data sent when a boss dies.
//
// Added: v1.17.10
message BossKilledEvent {
  // BossEntityUniqueID 是被击杀 boss 的唯一 ID。
  //
  // BossEntityUniqueID is the unique ID of the boss that was killed.
  //
  // Added: v1.17.10
  int64 BossEntityUniqueID = 1;
  // PlayerPartySize 是获得击杀归属的玩家队伍大小。
  //
  // PlayerPartySize is the size of the player party credited for the kill.
  //
  // Added: v1.17.10
  int32 PlayerPartySize = 2;
  // InteractionEntityType 是 boss 的实体类型运行时 ID。
  //
  // InteractionEntityType is the entity type runtime ID of the boss.
  //
  // Added: v1.17.10
  int32 InteractionEntityType = 3;
}

// AgentCommandEvent 是 Education Edition 使用的事件。
//
// AgentCommandEvent is an event used in Education Edition.
//
// Added: v1.17.10
message AgentCommandEvent {
  // AgentResult 是代理命令执行的结果代码。
  //
  // AgentResult is the result code of the agent command execution.
  //
  // Added: v1.17.10
  int32 AgentResult = 1;
  // DataValue 是与命令关联的辅助数值。
  //
  // DataValue is an auxiliary numeric value associated with the command.
  //
  // Added: v1.17.10
  int32 DataValue = 2;
  // Command 是已执行的代理命令名称。
  //
  // Command is the agent command name that was executed.
  //
  // Added: v1.17.10
  string Command = 3;
  // DataKey 是与命令载荷关联的键。
  //
  // DataKey is the key associated with the command payload.
  //
  // Added: v1.17.10
  string DataKey = 4;
  // Output 是代理命令返回的文本输出。
  //
  // Output is the textual output returned by the agent command.
  //
  // Added: v1.17.10
  string Output = 5;
}

// AgentCreatedEvent 是创建代理时发送的事件数据。
//
// AgentCreatedEvent is the event data sent when an agent is created.
//
// Added: v1.21.111
message AgentCreatedEvent {
}

// PatternRemovedEvent 是图案被移除时发送的事件数据。
//
// PatternRemovedEvent is the event data sent when a pattern is removed.
//
// Added: v1.19.70
message PatternRemovedEvent {
}

// SlashCommandExecutedEvent 是斜杠命令执行时发送的事件数据。
//
// SlashCommandExecutedEvent is the event data sent when a slash command is executed.
//
// Added: v1.17.10
message SlashCommandExecutedEvent {
  // SuccessCount 是成功执行的命令数量。
  //
  // SuccessCount is the number of successful command executions.
  //
  // Added: v1.17.10
  int32 SuccessCount = 1;
  // MessageCount 表示存在的 OutputMessages 数量。
  //
  // MessageCount indicates the amount of OutputMessages present.
  //
  // Added: v1.17.10
  int32 MessageCount = 2;
  // CommandName 是已执行的斜杠命令。
  //
  // CommandName is the slash command that was executed.
  //
  // Added: v1.17.10
  string CommandName = 3;
  // OutputMessages 是用 `;` 连接的消息列表。
  //
  // OutputMessages is a list of messages joined with `;`.
  //
  // Added: v1.17.10
  string OutputMessages = 4;
}

// FishBucketedEvent 是鱼被装入桶时发送的事件数据。
//
// FishBucketedEvent is the event data sent when a fish is bucketed.
//
// Added: v1.19.70
message FishBucketedEvent {
}

// MobBornEvent 是生物出生时发送的事件数据。
//
// MobBornEvent is the event data sent when a mob is born.
//
// Added: v1.19.70
message MobBornEvent {
  // EntityType 是新生成生物的实体类型运行时 ID。
  //
  // EntityType is the entity type runtime ID of the newly spawned mob.
  //
  // Added: v1.19.70
  int32 EntityType = 1;
  // Variant 是 mob variant 值。
  //
  // Variant is the mob variant value.
  //
  // Added: v1.19.70
  int32 Variant = 2;
  // Colour 是生物的颜色变种；不适用时可忽略。
  //
  // Colour is the colour variant of the mob, if applicable.
  //
  // Added: v1.19.70
  // Go type: uint8
  uint32 Colour = 3;
}

// PetDiedEvent 是宠物死亡时发送的事件数据。
//
// PetDiedEvent is the event data sent when a pet dies.
//
// Added: v1.19.70
message PetDiedEvent {
}

// CauldronInteractEvent 是炼药锅被交互时发送的事件数据。
//
// CauldronInteractEvent is the event data sent when a cauldron is interacted with.
//
// Added: v1.19.70
message CauldronInteractEvent {
  // BlockInteractionType 是发生的炼药锅交互类型。
  //
  // BlockInteractionType is the type of cauldron interaction that occurred.
  //
  // Added: v1.19.70
  // Go type: uint8
  uint32 BlockInteractionType = 1;
  // ItemID 是参与交互的数字物品 ID。
  //
  // ItemID is the numeric item ID involved in the interaction.
  //
  // Added: v1.19.70
  // Go type: int16
  int32 ItemID = 2;
}

// ComposterInteractEvent 是堆肥桶被交互时发送的事件数据。
//
// ComposterInteractEvent is the event data sent when a composter is interacted with.
//
// Added: v1.19.70
message ComposterInteractEvent {
  // BlockInteractionType 是发生的堆肥桶交互类型。
  //
  // BlockInteractionType is the type of composter interaction that occurred.
  //
  // Added: v1.19.70
  // Go type: uint8
  uint32 BlockInteractionType = 1;
  // ItemID 是参与交互的数字物品 ID。
  //
  // ItemID is the numeric item ID involved in the interaction.
  //
  // Added: v1.19.70
  // Go type: int16
  int32 ItemID = 2;
}

// BellUsedEvent 是铃铛被使用时发送的事件数据。
//
// BellUsedEvent is the event data sent when a bell is used.
//
// Added: v1.19.70
message BellUsedEvent {
  // ItemID 是参与敲响铃铛的数字物品 ID。
  //
  // ItemID is the numeric item ID involved in ringing the bell.
  //
  // Added: v1.19.70
  // Go type: int16
  int32 ItemID = 1;
}

// EntityDefinitionTriggerEvent 是用途未知的事件。
//
// EntityDefinitionTriggerEvent is an event used for an unknown purpose.
//
// Added: v1.19.70
message EntityDefinitionTriggerEvent {
  // EventName 是被触发实体定义事件的标识符。
  //
  // EventName is the identifier of the triggered entity definition event.
  //
  // Added: v1.19.70
  string EventName = 1;
}

// RaidUpdateEvent 是用于更新客户端侧袭击进度的事件。
//
// RaidUpdateEvent is an event used to update raid progress client side.
//
// Added: v1.19.70
message RaidUpdateEvent {
  // CurrentRaidWave 是 当前 raid wave number。
  //
  // CurrentRaidWave is the current raid wave number.
  //
  // Added: v1.19.70
  int32 CurrentRaidWave = 1;
  // TotalRaidWaves 是袭击总波数。
  //
  // TotalRaidWaves is the total amount of raid waves.
  //
  // Added: v1.19.70
  int32 TotalRaidWaves = 2;
  // WonRaid 指定袭击是否获胜。
  //
  // WonRaid specifies if the raid was won.
  //
  // Added: v1.19.70
  bool WonRaid = 3;
}

// MovementAnomalyEvent 是用于检测移动异常的事件。
//
// MovementAnomalyEvent is an event used to detect movement anomalies.
//
// Added: v1.19.70
message MovementAnomalyEvent {
}

// MovementCorrectedEvent 是用于修正移动异常的事件。
//
// MovementCorrectedEvent is an event used to correct movement anomalies.
//
// Added: v1.19.70
message MovementCorrectedEvent {
}

// ExtractHoneyEvent 是用于从蜂巢采集蜂蜜的事件。
//
// ExtractHoneyEvent is an event used to extract honey from a hive.
//
// Added: v1.19.70
message ExtractHoneyEvent {
}

// TargetBlockHitEvent 是箭命中标靶方块时使用的事件。
//
// TargetBlockHitEvent is an event used when a target block is hit by an arrow.
//
// Added: v1.21.20
message TargetBlockHitEvent {
  // RedstoneLevel 是命中标靶方块产生的红石强度。
  //
  // RedstoneLevel is the redstone strength produced by the hit target block.
  //
  // Added: v1.21.20
  int32 RedstoneLevel = 1;
}

// PiglinBarterEvent 会在玩家向猪灵丢出金锭以发起物品交易时调用。
//
// PiglinBarterEvent is called when a player drops gold ingots to a piglin to initiate a trade for an item.
//
// Added: v1.21.20
message PiglinBarterEvent {
  // ItemID 是被交易物品的数字物品 ID。
  //
  // ItemID is the numeric item ID that was bartered.
  //
  // Added: v1.21.20
  int32 ItemID = 1;
  // WasTargetingBarteringPlayer 指定猪灵是否正以发起交易的玩家为目标。
  //
  // WasTargetingBarteringPlayer specifies if the piglin was targeting the player who started the barter.
  //
  // Added: v1.21.20
  bool WasTargetingBarteringPlayer = 2;
}

// WaxedOrUnwaxedCopperEvent 是铜方块被涂蜡或除蜡时由服务端发送的事件。
//
// WaxedOrUnwaxedCopperEvent is an event sent by the server when a copper block is waxed or unwaxed.
//
// Added: v1.19.70
message WaxedOrUnwaxedCopperEvent {
  // CopperBlockID 是被涂蜡或除蜡铜方块的方块运行时 ID。
  //
  // CopperBlockID is the block runtime ID of the waxed or unwaxed copper block.
  //
  // Added: v1.19.70
  int32 CopperBlockID = 1;
}

// CodeBuilderRuntimeActionEvent 是执行代码生成器运行时动作时由服务端发送的事件。
//
// CodeBuilderRuntimeActionEvent is an event sent by the server when a code builder runtime action is performed.
//
// Added: v1.21.20
message CodeBuilderRuntimeActionEvent {
  // Action 是已执行的代码生成器运行时动作。
  //
  // Action is the code builder runtime action that was performed.
  //
  // Added: v1.21.20
  string Action = 1;
}

// CodeBuilderScoreboardEvent 是代码生成器计分板更新时由服务端发送的事件。
//
// CodeBuilderScoreboardEvent is an event sent by the server when a code builder scoreboard is updated.
//
// Added: v1.21.20
message CodeBuilderScoreboardEvent {
  // ObjectiveName 是已更新代码生成器计分板的目标名称。
  //
  // ObjectiveName is the objective name of the updated code builder scoreboard.
  //
  // Added: v1.21.20
  string ObjectiveName = 1;
  // Score 是更新后的分数值。
  //
  // Score is the updated score value.
  //
  // Added: v1.21.20
  int32 Score = 2;
}

// StriderRiddenInLavaInOverworldEvent 是在主世界熔岩中骑乘炽足兽时由服务端发送的事件。
//
// StriderRiddenInLavaInOverworldEvent is an event sent by the server when a strider is ridden in lava in the overworld.
//
// Added: v1.21.20
message StriderRiddenInLavaInOverworldEvent {
}

// SneakCloseToSculkSensorEvent 是玩家潜行靠近幽匿感测体时由服务端发送的事件。
//
// SneakCloseToSculkSensorEvent is an event sent by the server when a player sneaks close to a sculk sensor.
//
// Added: v1.19.70
message SneakCloseToSculkSensorEvent {
}

// CarefulRestorationEvent 是玩家执行细致修复时由服务端发送的事件。
//
// CarefulRestorationEvent is an event sent by the server when a player performs a careful restoration.
//
// Added: v1.21.20
message CarefulRestorationEvent {
}

// ItemUsedEvent 会在玩家右键使用物品时发送。
//
// ItemUsedEvent is sent when a player right clicks an item.
//
// Added: v1.21.0
message ItemUsedEvent {
  // ItemID 是被使用物品的数字物品 ID。
  //
  // ItemID is the numeric item ID of the used item.
  //
  // Added: v1.21.0
  // Go type: int16
  int32 ItemID = 1;
  // ItemAux 是被使用物品的辅助数据值。
  //
  // ItemAux is the auxiliary data value of the used item.
  //
  // Added: v1.21.0
  int32 ItemAux = 2;
  // UseMethod 标识物品的使用方式。
  //
  // UseMethod identifies how the item was used.
  //
  // Added: v1.21.0
  int32 UseMethod = 3;
  // UseCount 是执行的使用操作次数。
  //
  // UseCount is the amount of use operations that were performed.
  //
  // Added: v1.21.0
  int32 UseCount = 4;
}

// Event 表示保存某种事件专用数据的对象。
// 其中保存的数据取决于事件类型。
//
// Event represents an object that holds data specific to an event.
// The data it holds depends on the type.
message Event {
  // Go type: interface{ Marshal(r IO) }
  google.protobuf.Value Value = 1;
}

