// BiomeMultiNoiseRules 指定多噪声生物群系的规则；这类生物群系由多个噪声参数定义，而不只依赖温度和湿度。
//
// BiomeMultiNoiseRules specifies the rules for multi-noise biomes, which are biomes that are defined by
// multiple noise parameters instead of just temperature and humidity.
//
// Added: v1.21.80
message BiomeMultiNoiseRules {
  // Temperature 是生物群系的温度等级。
  //
  // Temperature is the temperature level of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Temperature = 1;
  // Humidity 是生物群系的湿度等级。
  //
  // Humidity is the humidity level of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Humidity = 2;
  // Altitude 是生物群系的海拔等级。
  //
  // Altitude is the altitude level of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Altitude = 3;
  // Weirdness 是生物群系的 weirdness 等级。
  //
  // Weirdness is the weirdness level of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Weirdness = 4;
  // Weight 是生物群系权重，权重越高越可能被选中。
  //
  // Weight is the weight of the biome, with a higher weight being more likely to be selected.
  //
  // Added: v1.21.80
  // Go type: float32
  float Weight = 5;
}

// BiomeConditionalTransformation 是转换生物群系的旧方法。
//
// BiomeConditionalTransformation is the legacy method of transforming biomes.
//
// Added: v1.21.80
message BiomeConditionalTransformation {
  // WeightedBiomes 是生物群系及其权重的列表。
  //
  // WeightedBiomes is a list of biomes and their weights.
  //
  // Added: v1.21.80
  // Go type: []BiomeWeight
  repeated BiomeWeight WeightedBiomes = 1;
  // ConditionJSON 是条件 JSON 数据在字符串列表中的索引。
  //
  // ConditionJSON is an index of the condition JSON data in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 ConditionJSON = 2;
  // MinPassingNeighbours 是应用转换所需的、满足条件的最小相邻数量。
  //
  // MinPassingNeighbours is the minimum number of neighbours that must pass the condition for the
  // transformation to be applied.
  //
  // Added: v1.21.80
  uint32 MinPassingNeighbours = 3;
}

// BiomeWeight 定义生物群系权重，用于加权随机。
//
// BiomeWeight defines the weight for a biome, used for weighted randomness.
//
// Added: v1.21.80
message BiomeWeight {
  // Biome 是生物群系名称在字符串列表中的索引。
  //
  // Biome is the index of the biome name in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 Biome = 1;
  // Weight 是生物群系权重，权重越高越可能被选中。
  //
  // Weight is the weight of the biome, with a higher weight being more likely to be selected.
  //
  // Added: v1.21.80
  uint32 Weight = 2;
}

// BiomeTemperatureWeight 定义温度权重，用于加权随机。
//
// BiomeTemperatureWeight defines the weight for a temperature, used for weighted randomness.
//
// Added: v1.21.80
message BiomeTemperatureWeight {
  // Temperature 是可被选中的温度。
  //
  // Temperature is the temperature that can be selected.
  //
  // Added: v1.21.80
