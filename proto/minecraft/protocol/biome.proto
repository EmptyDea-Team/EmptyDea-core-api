  // Go type: []BiomeWeight
  repeated BiomeWeight HillsTransformations = 1;
  // MutateTransformations 是应用到变种生物群系的加权生物群系转换列表。
  //
  // MutateTransformations is a list of weighted biome transformations to apply to mutated biomes.
  //
  // Added: v1.21.80
  // Go type: []BiomeWeight
  repeated BiomeWeight MutateTransformations = 2;
  // RiverTransformations 是应用到河流的加权生物群系转换列表。
  //
  // RiverTransformations is a list of weighted biome transformations to apply to rivers.
  //
  // Added: v1.21.80
  // Go type: []BiomeWeight
  repeated BiomeWeight RiverTransformations = 3;
  // ShoreTransformations 是应用到海岸的加权生物群系转换列表。
  //
  // ShoreTransformations is a list of weighted biome transformations to apply to shores.
  //
  // Added: v1.21.80
  // Go type: []BiomeWeight
  repeated BiomeWeight ShoreTransformations = 4;
  // PreHillsEdgeTransformations 是应用到丘陵边缘的条件转换列表。
