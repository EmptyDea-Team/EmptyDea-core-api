  //
  // Added: v1.21.80
  // Go type: []BiomeConditionalTransformation
  repeated BiomeConditionalTransformation PostShoreEdgeTransformations = 6;
  // ClimateTransformations 是应用到生物群系气候的加权温度转换列表。
  //
  // ClimateTransformations is a list of weighted temperature transformations to apply to the biome's climate.
