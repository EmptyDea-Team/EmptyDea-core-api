  // NonReplaceableBlocks is a list of block runtime IDs that may not be replaced.
  // Go type: []uint32
  repeated uint32 NonReplaceableBlocks = 1;
  // GradientBlocks 是渐变使用的方块运行时 ID 列表。
  //
  // GradientBlocks is a list of block runtime IDs used by the gradient.
  // Go type: []uint32
  repeated uint32 GradientBlocks = 2;
  // NoiseSeedString 是渐变噪声使用的种子字符串。
  //
  // NoiseSeedString is the seed string used by the gradient noise.
  string NoiseSeedString = 3;
  // FirstOctave 是渐变噪声使用的第一个 octave。
