enum BiomeCoordinateEvaluationOrderEnum {
  BiomeCoordinateEvaluationOrderXYZ = 0;
  BiomeCoordinateEvaluationOrderXZY = 1;
  BiomeCoordinateEvaluationOrderYXZ = 2;
  BiomeCoordinateEvaluationOrderYZX = 3;
  BiomeCoordinateEvaluationOrderZXY = 4;
  BiomeCoordinateEvaluationOrderZYX = 5;
}

enum BiomeRandomDistributionTypeEnum {
  BiomeRandomDistributionTypeSingleValued = 0;
  BiomeRandomDistributionTypeUniform = 1;
  BiomeRandomDistributionTypeGaussian = 2;
  BiomeRandomDistributionTypeInverseGaussian = 3;
  BiomeRandomDistributionTypeFixedGrid = 4;
  BiomeRandomDistributionTypeJitteredGrid = 5;
  BiomeRandomDistributionTypeTriangle = 6;
}

// BiomeDefinition 表示游戏中的生物群系定义，可以是原版生物群系，也可以是完全自定义的生物群系。
//
// BiomeDefinition represents a biome definition in the game. This can be a vanilla biome or a completely
// custom biome.
//
// Added: v1.21.80
message BiomeDefinition {
  // NameIndex 表示生物群系名称在字符串列表中的索引。
  //
  // NameIndex represents the index of the biome name in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 NameIndex = 1;
  // BiomeID 是生物群系 ID。
  //
  // BiomeID is the biome ID.
  //
  // Added: v1.21.80, Changed: v1.21.100
  // 自 v1.21.100 起，BiomeID 从 Optional[uint16] 改为 int16。
  //
  // Since v1.21.100, BiomeID changed from Optional[uint16] to int16.
  // Go type: int16
  int32 BiomeID = 2;
  // Temperature 是生物群系温度，用于天气、生物群系行为和天空颜色。
  //
  // Temperature is the temperature of the biome, used for weather, biome behaviours and sky colour.
  //
  // Added: v1.21.80
  // Go type: float32
  float Temperature = 3;
  // Downfall 表示降水对颜色和方块变化的影响程度。
  //
  // Downfall is the amount that precipitation affects colours and block changes.
  //
  // Added: v1.21.80
  // Go type: float32
  float Downfall = 4;
  // FoliageSnow 是树叶因积雪变白的进度因子。
  //
  // FoliageSnow is the progression factor for foliage turning white due to snow.
  //
  // Added: v1.21.110
  // Go type: float32
  float FoliageSnow = 5;
  // RedSporeDensity 是生物群系中的红色孢子密度。
  //
  // RedSporeDensity is the density of red spores in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float RedSporeDensity = 6;
  // BlueSporeDensity 是生物群系中的蓝色孢子密度。
  //
  // BlueSporeDensity is the density of blue spores in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float BlueSporeDensity = 7;
  // AshDensity 是生物群系中的灰烬密度。
  //
  // AshDensity is the density of ash in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float AshDensity = 8;
  // WhiteAshDensity 是生物群系中的白色灰烬密度。
  //
  // WhiteAshDensity is the density of white ash in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float WhiteAshDensity = 9;
  // Depth 是生物群系的深度。
  //
  // Depth is the depth of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Depth = 10;
  // Scale 是生物群系的缩放值。
  //
  // Scale is the scale of the biome.
  //
  // Added: v1.21.80
  // Go type: float32
  float Scale = 11;
  // MapWaterColour 是地图上该生物群系水体颜色使用的 ARGB 值。
  //
  // MapWaterColour is an ARGB value for the water colour on maps in the biome.
  //
  // Added: v1.21.80
  int32 MapWaterColour = 12;
  // Rain 为 true 表示该生物群系会下雨；为 false 表示它是干燥生物群系。
  //
  // Rain is true if the biome has rain, false if it is a dry biome.
  //
  // Added: v1.21.80
  bool Rain = 13;
  // Dimension 是网易生物群系定义携带的维度 ID。
  //
  // Dimension is the dimension ID carried by NetEase biome definitions.
  //
  // Added: NetEase.
  int32 Dimension = 14;
  // Vanilla 是网易生物群系定义关联的原版生物群系名称。
  //
  // Vanilla is the vanilla biome name associated with a NetEase biome definition.
  //
  // Added: NetEase.
  string Vanilla = 15;
  // Tags 是字符串列表中标签索引的列表，用于在生成等场景中对生物群系分组。
  //
  // Tags are a list of indices of tags in the string list. These are used to group biomes together for
  // biome generation and other purposes.
  //
  // Added: v1.21.80
  // Go type: Optional[[]uint16]
  .mousetunnel.minecraft.protocol.Optional Tags = 16;
  // ChunkGeneration 是辅助客户端区块生成的可选信息。几乎所有服务器都可以且应该留空，以显著减小该数据包体积。
  //
  // ChunkGeneration is optional information to assist in client-side chunk generation. Almost all servers
  // can and should leave this empty to greatly reduce the size of this packet. Only BDS and servers which
  // *exactly* match the vanilla chunk generation can benefit from this.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeChunkGeneration]
  .mousetunnel.minecraft.protocol.Optional ChunkGeneration = 17;
}

// BiomeChunkGeneration 表示客户端自行生成区块所需的信息，用于营造更大渲染距离的效果。
//
// BiomeChunkGeneration represents the information required for the client to generate chunks itself
// to create the illusion of a larger render distance.
//
// Added: v1.21.80
message BiomeChunkGeneration {
  // Climate 是用于指定生物群系气候的可选信息。
  //
  // Climate is optional information to specify the biome's climate.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeClimate]
  .mousetunnel.minecraft.protocol.Optional Climate = 1;
  // ConsolidatedFeatures 是被合并为单个 feature 的 feature 列表。
  //
  // ConsolidatedFeatures is a list of features that are consolidated into a single feature.
  //
  // Added: v1.21.80
  // Go type: Optional[[]BiomeConsolidatedFeature]
  .mousetunnel.minecraft.protocol.Optional ConsolidatedFeatures = 2;
  // MountainParameters 是用于指定生物群系山地参数的可选信息。
  //
  // MountainParameters is optional information to specify the biome's mountain parameters.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeMountainParameters]
  .mousetunnel.minecraft.protocol.Optional MountainParameters = 3;
  // SurfaceMaterialAdjustments 是表面材料调整列表。
  //
  // SurfaceMaterialAdjustments is a list of surface material adjustments.
  //
  // Added: v1.21.80
  // Go type: Optional[[]BiomeElementData]
  .mousetunnel.minecraft.protocol.Optional SurfaceMaterialAdjustments = 4;
  // SurfaceMaterials 是生物群系表层使用的一组材料。
  //
  // SurfaceMaterials is a set of materials to use for the surface layers of the biome.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeSurfaceMaterial]
  .mousetunnel.minecraft.protocol.Optional SurfaceMaterials = 5;
  // HasDefaultOverworldSurface 为 true 表示生物群系具有默认主世界表面。
  //
  // HasDefaultOverworldSurface is true if the biome has a default overworld surface.
  //
  // Added: v1.21.110
  bool HasDefaultOverworldSurface = 6;
  // HasSwampSurface 为 true 表示生物群系具有沼泽表面。
  //
  // HasSwampSurface is true if the biome has a swamp surface.
  //
  // Added: v1.21.80
  bool HasSwampSurface = 7;
  // HasFrozenOceanSurface 为 true 表示生物群系具有冻洋表面。
  //
  // HasFrozenOceanSurface is true if the biome has a frozen ocean surface.
  //
  // Added: v1.21.80
  bool HasFrozenOceanSurface = 8;
  // HasEndSurface 为 true 表示生物群系具有末地表面。
  //
  // HasEndSurface is true if the biome has an end surface.
  //
  // Added: v1.21.80
  bool HasEndSurface = 9;
  // MesaSurface 是用于指定生物群系恶地表面的可选信息。
  //
  // MesaSurface is optional information to specify the biome's mesa surface.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeMesaSurface]
  .mousetunnel.minecraft.protocol.Optional MesaSurface = 10;
  // CappedSurface 是用于指定生物群系封顶表面的可选信息，例如下界中的表面。
  //
  // CappedSurface is optional information to specify the biome's capped surface, i.e. in the Nether.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeCappedSurface]
  .mousetunnel.minecraft.protocol.Optional CappedSurface = 11;
  // OverworldRules 是用于指定生物群系主世界规则的可选信息，例如河流和丘陵。
  //
  // OverworldRules is optional information to specify the biome's overworld rules, such as rivers and hills.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeOverworldRules]
  .mousetunnel.minecraft.protocol.Optional OverworldRules = 12;
  // MultiNoiseRules 是用于指定生物群系多噪声规则的可选信息。
  //
  // MultiNoiseRules is optional information to specify the biome's multi-noise rules.
  //
  // Added: v1.21.80
  // Go type: Optional[BiomeMultiNoiseRules]
  .mousetunnel.minecraft.protocol.Optional MultiNoiseRules = 13;
  // LegacyRules 是旧格式生物群系使用的旧规则列表；该旧格式只是加权生物群系列表。
  //
  // LegacyRules is a list of legacy rules for the biomes using an older format, which is just a list of
  // weighted biomes.
  //
  // Added: v1.21.80
  // Go type: Optional[[]BiomeConditionalTransformation]
  .mousetunnel.minecraft.protocol.Optional LegacyRules = 14;
  // ReplacementsData 是生物群系替换数据列表。
  //
  // ReplacementsData is a list of biome replacement data.
  //
  // Added: v1.26.0
  // Go type: Optional[[]BiomeReplacementData]
  .mousetunnel.minecraft.protocol.Optional ReplacementsData = 15;
  // VillageType 是生物群系区块生成使用的可选村庄类型。
  //
  // VillageType is the optional village type for the biome's chunk generation.
  //
  // Added: v1.26.0
  // Go type: Optional[uint8]
  .mousetunnel.minecraft.protocol.Optional VillageType = 16;
  // SurfaceBuilder 是生物群系表面构建器使用的可选信息。
  //
  // SurfaceBuilder is optional information for the biome's surface builder.
  //
  // Added: v1.26.20
  // Go type: Optional[BiomeSurfaceBuilder]
  .mousetunnel.minecraft.protocol.Optional SurfaceBuilder = 17;
  // SubsurfaceBuilder 是生物群系地下表面构建器使用的可选信息。
  //
  // SubsurfaceBuilder is optional information for the biome's subsurface builder.
  //
  // Added: v1.26.20
  // Go type: Optional[BiomeSurfaceBuilder]
  .mousetunnel.minecraft.protocol.Optional SubsurfaceBuilder = 18;
}

// BiomeClimate 表示生物群系气候，主要用于环境效果，也会定义部分行为。
//
// BiomeClimate represents the climate of a biome, mainly for ambience but also defines certain behaviours.
//
// Added: v1.21.80
message BiomeClimate {
  // Temperature 是生物群系温度，用于天气、生物群系行为和天空颜色。
  //
  // Temperature is the temperature of the biome, used for weather, biome behaviours and sky colour.
  //
  // Added: v1.21.80
  // Go type: float32
  float Temperature = 1;
  // Downfall 表示降水对颜色和方块变化的影响程度。
  //
  // Downfall is the amount that precipitation affects colours and block changes.
  //
  // Added: v1.21.80
  // Go type: float32
  float Downfall = 2;
  // SnowAccumulationMin 是生物群系可累积的最小积雪量，每 0.125 表示一层雪。
  //
  // SnowAccumulationMin is the minimum amount of snow that can accumulate in the biome, every 0.125 is
  // another layer of snow.
  //
  // Added: v1.21.80
  // Go type: float32
  float SnowAccumulationMin = 3;
  // SnowAccumulationMax 是生物群系可累积的最大积雪量，每 0.125 表示一层雪。
  //
  // SnowAccumulationMax is the maximum amount of snow that can accumulate in the biome, every 0.125 is
  // another layer of snow.
  //
  // Added: v1.21.80
  // Go type: float32
  float SnowAccumulationMax = 4;
  // RedSporeDensity 是生物群系中的红色孢子密度。
  //
  // RedSporeDensity is the density of red spores in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float RedSporeDensity = 5;
  // BlueSporeDensity 是生物群系中的蓝色孢子密度。
  //
  // BlueSporeDensity is the density of blue spores in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float BlueSporeDensity = 6;
  // AshDensity 是生物群系中的灰烬密度。
  //
  // AshDensity is the density of ash in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float AshDensity = 7;
  // WhiteAshDensity 是生物群系中的白色灰烬密度。
  //
  // WhiteAshDensity is the density of white ash in the biome.
  //
  // Added: v1.21.80, Removed: v1.21.110
  // Go type: float32
  float WhiteAshDensity = 8;
}

// BiomeConsolidatedFeature 表示为生物群系合并成单个 feature 的 feature。
//
// BiomeConsolidatedFeature represents a feature that is consolidated into a single feature for the biome.
//
// Added: v1.21.80
message BiomeConsolidatedFeature {
  // Scatter 定义 feature 在生物群系中的散布方式。
  //
  // Scatter defines how the feature is scattered in the biome.
  //
  // Added: v1.21.80
  BiomeScatterParameter Scatter = 1;
  // Feature 是 feature 名称在字符串列表中的索引。
  //
  // Feature is the index of the feature's name in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 Feature = 2;
  // Identifier 是 feature 标识符在字符串列表中的索引。
  //
  // Identifier is the index of the feature's identifier in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 Identifier = 3;
  // Pass 是 feature pass 在字符串列表中的索引。
  //
  // Pass is the index of the feature's pass in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 Pass = 4;
  // CanUseInternal 为 true 表示该 feature 可使用内部 feature。
  //
  // CanUseInternal is true if the feature can use internal features.
  //
  // Added: v1.21.80
  bool CanUseInternal = 5;
}

// BiomeScatterParameter 定义生物群系 feature 的散布方式，以及可尝试散布的次数。
//
// BiomeScatterParameter defines how a biome feature is scattered and how many times it may be attempted.
//
// Added: v1.21.80
message BiomeScatterParameter {
  // Coordinates 是散布 feature 时使用的坐标规则列表。
  //
  // Coordinates is a list of coordinate rules to scatter the feature within.
  //
  // Added: v1.21.80
  // Go type: []BiomeCoordinate
  repeated BiomeCoordinate Coordinates = 1;
  // EvaluationOrder 是坐标求值顺序，取值为上方 CoordinateEvaluationOrder 常量之一。
  //
  // EvaluationOrder is the order in which the coordinates are evaluated, and is one of the
  // CoordinateEvaluationOrder constants above.
  //
  // Added: v1.21.80
  int32 EvaluationOrder = 2;
  // ChancePercentType 是 chance percent 使用的表达式操作类型，取值为上方 BiomeExpressionOp 常量之一。
  //
  // ChancePercentType is the type of expression operation to use for the chance percent, and is one of the
  // BiomeExpressionOp constants above.
  //
  // Added: v1.21.80
  int32 ChancePercentType = 3;
  // ChancePercent 是 chance 表达式在字符串列表中的索引。
  //
  // ChancePercent is the index of the chance expression in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 ChancePercent = 4;
  // ChanceNumerator 是 chance 表达式的分子。
  //
  // ChanceNumerator is the numerator of the chance expression.
  //
  // Added: v1.21.80
  int32 ChanceNumerator = 5;
  // ChanceDenominator 是 chance 表达式的分母。
  //
  // ChanceDenominator is the denominator of the chance expression.
  //
  // Added: v1.21.80
  int32 ChanceDenominator = 6;
  // IterationsType 是 iterations 使用的表达式操作类型，取值为上方 BiomeExpressionOp 常量之一。
  //
  // IterationsType is the type of expression operation to use for the iterations, and is one of the
  // BiomeExpressionOp constants above.
  //
  // Added: v1.21.80
  int32 IterationsType = 7;
  // Iterations 是 iterations 表达式在字符串列表中的索引。
  //
  // Iterations is the index of the iterations expression in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 Iterations = 8;
}

// BiomeCoordinate 指定 feature 可在生物群系中散布的坐标规则。
//
// BiomeCoordinate specifies coordinate rules for where features can be scattered in the biome.
//
// Added: v1.21.80
message BiomeCoordinate {
  // MinValueType 是 minimum value 使用的表达式操作类型，取值为上方 BiomeExpressionOp 常量之一。
  //
  // MinValueType is the type of expression operation to use for the minimum value, and is one of the
  // BiomeExpressionOp constants above.
  //
  // Added: v1.21.80
  int32 MinValueType = 1;
  // MinValue 是 minimum value 表达式在字符串列表中的索引。
  //
  // MinValue is the index of the minimum value expression in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 MinValue = 2;
  // MaxValueType 是 maximum value 使用的表达式操作类型，取值为上方 BiomeExpressionOp 常量之一。
  //
  // MaxValueType is the type of expression operation to use for the maximum value, and is one of the
  // BiomeExpressionOp constants above.
  //
  // Added: v1.21.80
  int32 MaxValueType = 3;
  // MaxValue 是 maximum value 表达式在字符串列表中的索引。
  //
  // MaxValue is the index of the maximum value expression in the string list.
  //
  // Added: v1.21.80
  // Go type: int16
  int32 MaxValue = 4;
  // GridOffset 是网格偏移量，用于固定网格和抖动网格分布。
  //
  // GridOffset is the offset of the grid, used for fixed grid and jittered grid distributions.
  //
  // Added: v1.21.80
  uint32 GridOffset = 5;
  // GridStepSize 是网格步长，用于固定网格和抖动网格分布。
  //
  // GridStepSize is the step size of the grid, used for fixed grid and jittered grid distributions.
