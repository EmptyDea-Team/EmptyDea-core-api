  BiomeExpressionOpClamp = 15;
  BiomeExpressionOpCopySign = 16;
  BiomeExpressionCos = 17;
  BiomeExpressionDieRoll = 18;
  BiomeExpressionDieRollInt = 19;
  BiomeExpressionDiv = 20;
  BiomeExpressionExp = 21;
  BiomeExpressionFloor = 22;
  BiomeExpressionHermiteBlend = 23;
  BiomeExpressionLerp = 24;
