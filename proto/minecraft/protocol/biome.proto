  // Weight 是温度权重，权重越高越可能被选中。
  //
  // Weight is the weight of the temperature, with a higher weight being more likely to be selected.
  //
  // Added: v1.21.80
  uint32 Weight = 2;
}

// BiomeReplacementData 表示生物群系替换数据。
