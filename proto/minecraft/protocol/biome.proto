// BiomeNoiseGradientSurface 指定生物群系的噪声渐变表面方块数据。
//
// BiomeNoiseGradientSurface specifies noise-gradient surface block data for a biome.
message BiomeNoiseGradientSurface {
  // NonReplaceableBlocks 是不可被替换的方块运行时 ID 列表。
