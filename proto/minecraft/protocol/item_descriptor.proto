syntax = "proto3";

package mousetunnel.minecraft.protocol.item_descriptor;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol;protocol";

enum ItemDescriptorEnum {
  ItemDescriptorInvalid = 0;
  ItemDescriptorDefault = 1;
  ItemDescriptorMoLang = 2;
  ItemDescriptorItemTag = 3;
  ItemDescriptorDeferred = 4;
  ItemDescriptorComplexAlias = 5;
}

// ItemDescriptorCount 表示带有数量的物品描述符，例如配方原料。
//
// ItemDescriptorCount represents an item descriptor that has a count attached with it, such as a recipe ingredient.
//
// Added: v1.19.30
message ItemDescriptorCount {
  // Descriptor 表示该物品在网络上的描述方式，应为上方描述符之一。
  //
  // Descriptor represents how the item is described over the network. It is one of the descriptors above.
  //
  // Added: v1.19.30
  ItemDescriptor Descriptor = 1;
  // Count 是该物品描述符所需的物品数量。
  //
  // Count is the count of items that the item descriptor is required to have.
  //
  // Added: v1.19.30
  int32 Count = 2;
}

// InvalidItemDescriptor 表示无效物品描述符。原版服务器通常会为
// 空槽位或空原料发送该描述符。
//
// InvalidItemDescriptor represents an invalid item descriptor. This is usually sent by the vanilla server for empty
// slots or ingredients.
//
// Added: v1.19.30
message InvalidItemDescriptor {
}

// DefaultItemDescriptor 表示普通物品的物品描述符。绝大多数物品都会使用它。
//
// DefaultItemDescriptor represents an item descriptor for regular items. This is used for the significant majority of
// items.
//
// Added: v1.19.30
message DefaultItemDescriptor {
  // NetworkID 是物品的数字网络 ID。根据对应物品不同，它有时是正 ID，
  // 有时是负 ID。
  //
  // NetworkID is the numerical network ID of the item. This is sometimes a positive ID, and sometimes a
  // negative ID, depending on what item it concerns.
  //
  // Added: v1.19.30
  // Go type: int16
  int32 NetworkID = 1;
  // MetadataValue 是物品的元数据值。对某些物品而言这是耐久损伤值，
  // 对其他物品而言则只是物品变体的标识符。
  //
  // MetadataValue is the metadata value of the item. For some items, this is the damage value, whereas for
  // other items it is simply an identifier of a variant of the item.
  //
  // Added: v1.19.30
  // Go type: int16
  int32 MetadataValue = 2;
}

// MoLangItemDescriptor 表示使用 MoLang 的物品描述符，例如行为包中的物品。
//
// MoLangItemDescriptor represents an item descriptor for items that use MoLang (e.g. behaviour packs).
//
// Added: v1.19.30
message MoLangItemDescriptor {
  // Expression 表示用于标识该物品或其关联标签的 MoLang 表达式。
  //
  // Expression represents the MoLang expression used to identify the item/it's associated tag.
  //
  // Added: v1.19.30
  string Expression = 1;
  // Version 表示要使用的 MoLang 版本。
  //
  // Version represents the version of MoLang to use.
  //
  // Added: v1.19.30
  // Go type: uint8
  uint32 Version = 2;
}

// ItemTagItemDescriptor 表示使用物品标签的物品描述符。
// 对可归入单个标签的物品，应使用它来减少重复条目。
//
// ItemTagItemDescriptor represents an item descriptor that uses item tagging. This should be used to reduce duplicative
// entries for items that can be grouped under a single tag.
//
// Added: v1.19.30
message ItemTagItemDescriptor {
  // Tag 表示该物品所属的标签。
  //
  // Tag represents the tag that the item is part of.
  //
  // Added: v1.19.30
  string Tag = 1;
}

// DeferredItemDescriptor 表示使用命名空间和元数据值标识物品的物品描述符。
// 使用该物品描述符没有明确收益。
//
// DeferredItemDescriptor represents an item descriptor that uses a namespace and metadata value to identify the item.
// There is no clear benefit of using this item descriptor.
//
// Added: v1.19.30
message DeferredItemDescriptor {
  // Name 是物品名称，例如 `minecraft:stick`。
  //
  // Name is the name of the item, which is a name like 'minecraft:stick'.
  //
  // Added: v1.19.30
  string Name = 1;
  // MetadataValue 是物品的元数据值。对某些物品而言这是耐久损伤值，
  // 对其他物品而言则只是物品变体的标识符。
  //
  // MetadataValue is the metadata value of the item. For some items, this is the damage value, whereas for
  // other items it is simply an identifier of a variant of the item.
  //
  // Added: v1.19.30
  // Go type: int16
  int32 MetadataValue = 2;
}

// ComplexAliasItemDescriptor 表示使用单个名称标识物品的物品描述符。
// 使用该物品描述符没有明确收益，并且它似乎只用于特定配方。
//
// ComplexAliasItemDescriptor represents an item descriptor that uses a single name to identify the item. There is no
// clear benefit of using this item descriptor and only seem to be used for specific recipes.
//
// Added: v1.19.70
message ComplexAliasItemDescriptor {
  // Name 是物品名称，例如 `minecraft:stick`。
  //
  // Name is the name of the item, which is a name like 'minecraft:stick'.
  //
  // Added: v1.19.70
  string Name = 1;
}

// ItemDescriptor 表示一种物品描述符类型。它是下方具体类型之一，
// 同时也是 Marshaler 的别名。
//
// ItemDescriptor represents a type of item descriptor. This is one of the concrete types below. It is an alias of
// Marshaler.
message ItemDescriptor {
  int64 Type = 1;
  InvalidItemDescriptor Invalid = 2;
  DefaultItemDescriptor Default = 3;
  MoLangItemDescriptor MoLang = 4;
  ItemTagItemDescriptor ItemTag = 5;
  DeferredItemDescriptor Deferred = 6;
  ComplexAliasItemDescriptor ComplexAlias = 7;
}

