// ParameterKeyframeValue 表示图形参数的关键帧值。
//
// ParameterKeyframeValue represents a keyframe value for graphics parameters.
//
// Added: v1.21.120
message ParameterKeyframeValue {
  // Time 是该关键帧的时间。
  //
  // Time is the time for this keyframe.
  //
  // Added: v1.21.120
  // Go type: float32
  float Time = 1;
  // Value 是该关键帧上的值。
  //
  // Value is the value at this keyframe.
  //
  // Added: v1.21.120
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Value = 2;
}

