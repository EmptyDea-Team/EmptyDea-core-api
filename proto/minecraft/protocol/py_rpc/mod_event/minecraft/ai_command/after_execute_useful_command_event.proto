syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.after_execute_useful_command_event;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";

// AfterExecuteUsefulCommandEvent 描述实用命令执行后的结果。
//
// AfterExecuteUsefulCommandEvent describes the result after executing a useful command.
message AfterExecuteUsefulCommandEvent {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // Command 是已执行的命令文本。
  //
  // Command is the command text that was executed.
  string Command = 2;
  // Success 表示命令是否执行成功。
  //
  // Success indicates whether the command executed successfully.
  bool Success = 3;
}

