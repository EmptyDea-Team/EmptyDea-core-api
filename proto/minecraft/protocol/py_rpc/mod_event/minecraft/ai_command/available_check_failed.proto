syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.available_check_failed;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";

// AvailableCheckFailed 描述魔法指令前置检查失败原因。
//
// AvailableCheckFailed describes why the AI command availability check failed.
message AvailableCheckFailed {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // Reason 是检查失败原因。
  //
  // Reason is the reason the check failed.
  string Reason = 2;
}

