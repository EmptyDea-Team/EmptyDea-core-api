syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.execute_useful_command_event;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";

// ExecuteUsefulCommandEvent 请求服务器执行实用命令。
//
// ExecuteUsefulCommandEvent asks the server to execute a useful command.
message ExecuteUsefulCommandEvent {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // Command 是要执行的命令文本。
  //
  // Command is the command text to execute.
  string Command = 2;
}

