syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.request_ai_command_event;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";

// RequestAICommandEvent 请求服务器生成魔法指令。
//
// RequestAICommandEvent asks the server to generate AI commands.
message RequestAICommandEvent {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // Message 是用户输入的提示文本。
  //
  // Message is the prompt text entered by the user.
  string Message = 2;
  // PromptType 是提示类型。
  //
  // PromptType is the prompt type.
  int64 PromptType = 3;
  // HasCount 表示客户端是否还有可用次数。
  //
  // HasCount indicates whether the client still has quota.
  bool HasCount = 4;
}

