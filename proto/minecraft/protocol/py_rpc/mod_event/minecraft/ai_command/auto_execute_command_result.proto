syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.auto_execute_command_result;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";
import "py_rpc/mod_event/minecraft/ai_command/types.proto";

// AutoExecuteCommandResult 描述自动执行命令的结果。
//
// AutoExecuteCommandResult describes the result of an auto-executed command.
message AutoExecuteCommandResult {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // UID 是自动执行请求的关联 ID。
  //
  // UID is the correlation ID for the auto-execution request.
  string UID = 2;
  // ExecuteResult 表示命令是否执行成功。
  //
  // ExecuteResult indicates whether the command executed successfully.
  bool ExecuteResult = 3;
  // Command 是已执行的命令文本。
  //
  // Command is the command text that was executed.
  string Command = 4;
  // TriggerEvent 表示命令是否触发了输出事件。
  //
  // TriggerEvent indicates whether the command triggered an output event.
  bool TriggerEvent = 5;
  // GenerateType 是生成类型。
  //
  // GenerateType is the generation type.
  int64 GenerateType = 6;
  // AIModel 是服务端返回的 AI 模型标识。
  //
  // AIModel is the AI model identifier returned by the server.
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.types.AIModel AIModel = 7;
  // IsLast 表示是否是最后一条命令。
  //
  // IsLast indicates whether this is the final command.
  bool IsLast = 8;
  // IsFirst 表示是否是第一条命令。
  //
  // IsFirst indicates whether this is the first command.
  bool IsFirst = 9;
}

