syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.ai_count_not_enough_event;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/ai_command;ai_command";

import "py_rpc/mod_event/minecraft/ai_command/basic.proto";

// AICountNotEnoughEvent 表示魔法指令次数不足。
//
// AICountNotEnoughEvent indicates the AI-command quota is not enough.
message AICountNotEnoughEvent {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.ai_command.basic.Basic Basic = 1;
  // PromptType 是次数不足的提示类型。
  //
  // PromptType is the prompt type with insufficient quota.
  int64 PromptType = 2;
}

