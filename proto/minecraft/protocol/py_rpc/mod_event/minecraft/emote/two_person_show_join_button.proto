syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.emote.two_person_show_join_button;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/emote;emote";

import "py_rpc/mod_event/minecraft/emote/basic.proto";

// TwoPersonShowJoinButton 通知客户端显示或隐藏双人动作加入按钮。
//
// TwoPersonShowJoinButton notifies the client to show or hide a two-person-emote join button.
message TwoPersonShowJoinButton {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.emote.basic.Basic Basic = 1;
  // Inviter 是邀请方玩家 ID。
  //
  // Inviter is the inviting player ID.
  string Inviter = 2;
  // EmoteID 是双人动作 ID。
  //
  // EmoteID is the two-person emote ID.
  string EmoteID = 3;
  // Show 表示是否显示加入按钮。
  //
  // Show indicates whether to show the join button.
  bool Show = 4;
}

