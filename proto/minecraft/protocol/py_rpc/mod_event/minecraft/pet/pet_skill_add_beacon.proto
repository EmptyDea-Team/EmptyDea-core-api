syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.pet.pet_skill_add_beacon;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/pet;pet";

import "py_rpc/mod_event/minecraft/pet/basic.proto";

// PetSkillAddBeacon 表示新增宠物技能信标。
//
// PetSkillAddBeacon indicates that a pet skill beacon was added.
message PetSkillAddBeacon {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.pet.basic.Basic Basic = 1;
  PetBeaconData PetBeaconData = 2;
}

// PetBeaconData 保存宠物信标字段。
//
// PetBeaconData stores pet beacon fields.
message PetBeaconData {
  string PetID = 1;
  // Go type: []float64
  repeated double Position = 2;
  // Go type: []float64
  repeated double MixColor = 3;
}

