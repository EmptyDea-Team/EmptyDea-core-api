syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.pet.notify_add_beacon;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/pet;pet";

import "py_rpc/mod_event/minecraft/pet/basic.proto";

// NotifyAddBeacon 请求服务器添加宠物技能信标。
//
// NotifyAddBeacon asks the server to add a pet skill beacon.
message NotifyAddBeacon {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.pet.basic.Basic Basic = 1;
  NotifyAddBeaconData NotifyAddBeaconData = 2;
}

// NotifyAddBeaconData 保存宠物信标字段。
//
// NotifyAddBeaconData stores pet beacon fields.
message NotifyAddBeaconData {
  string PetID = 1;
  // Go type: []float64
  repeated double Position = 2;
  // Go type: []float64
  repeated double MixColor = 3;
}

