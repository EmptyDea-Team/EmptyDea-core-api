syntax = "proto3";

package mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.add_player_track_motion;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/py_rpc/mod_event/minecraft/move;move";

import "py_rpc/mod_event/minecraft/move/basic.proto";
import "py_rpc/mod_event/minecraft/move/types.proto";

// AddPlayerTrackMotion 添加玩家轨迹运动。
//
// AddPlayerTrackMotion adds a player track motion.
message AddPlayerTrackMotion {
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.basic.Basic Basic = 1;
  string PlayerID = 2;
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.types.MotionVector TargetPos = 3;
  // Go type: float64
  double Duration = 4;
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.types.MotionVector StartPos = 5;
  bool RelativeCoord = 6;
  bool IsLoop = 7;
  bool UseVelocityDir = 8;
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.types.MotionVector TargetRot = 9;
  .mousetunnel.minecraft.protocol.py_rpc.mod_event.minecraft.move.types.MotionVector StartRot = 10;
  int64 ServerMotionID = 11;
  string Ease = 12;
}

