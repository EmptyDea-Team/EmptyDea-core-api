syntax = "proto3";

package mousetunnel.minecraft.protocol.mgl32;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/mgl32;mgl32";

message Vec2 {
  float x = 1;
  float y = 2;
}

message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Vec3d {
  double x = 1;
  double y = 2;
  double z = 3;
}

