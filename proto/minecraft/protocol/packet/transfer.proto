syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.transfer;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// Transfer 由服务器发送，用于将玩家从当前服务器转移到另一台服务器。
// 这样会让客户端完全断开连接，返回主菜单，并连接到下一台服务器。
//
// Transfer is sent by the server to transfer a player from the current server to another. Doing so will
// fully disconnect the client, bring it back to the main menu and make it connect to the next server.
//
// Added: v1.12
message Transfer {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDTransfer;
  // Address 是新服务器的地址，可以是主机名，也可以是实际 IP 地址。
  //
  // Address is the address of the new server, which might be either a hostname or an actual IP address.
  //
  // Added: v1.12
  string Address = 1;
  // Port 是新服务器的 UDP 端口。
  //
  // Port is the UDP port of the new server.
  //
  // Added: v1.12
  // Go type: uint16
  uint32 Port = 2;
  // ReloadWorld 的用途目前未知。
  //
  // ReloadWorld currently has an unknown usage.
  //
  // Added: v1.21.30
  bool ReloadWorld = 3;
}

