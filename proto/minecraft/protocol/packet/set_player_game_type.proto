syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.set_player_game_type;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

enum GameTypeEnum {
  GameTypeSurvival = 0;
  GameTypeCreative = 1;
  GameTypeAdventure = 2;
  GameTypeSurvivalSpectator = 3;
  GameTypeCreativeSpectator = 4;
  GameTypeDefault = 5;
  GameTypeSpectator = 6;
}

// SetPlayerGameType 由服务器发送，用于更新玩家的游戏类型，也就是游戏模式。
//
// SetPlayerGameType is sent by the server to update the game type, which is otherwise known as the game mode,
// of a player.
//
// Added: v1.18.30
message SetPlayerGameType {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDSetPlayerGameType;
  // GameType 是玩家的新游戏类型，它是上方常量之一。部分游戏类型还需要在 AdventureSettings 数据包中设置额外标志，
  // 才能获得完整功能。
  //
  // GameType is the new game type of the player. It is one of the constants that can be found above. Some
  // of these game types require additional flags to be set in an AdventureSettings packet for the game mode
  // to obtain its full functionality.
  //
  // Added: v1.18.30
  int32 GameType = 1;
}

