syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.player_toggle_crafter_slot_request;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// PlayerToggleCrafterSlotRequest 在客户端尝试切换合成器中某个槽位状态时发送。
//
// PlayerToggleCrafterSlotRequest is sent by the client when it tries to toggle the state of a slot within a Crafter.
//
// Added: v1.20.50
message PlayerToggleCrafterSlotRequest {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlayerToggleCrafterSlotRequest;
  // PosX 是正在被修改的合成器 X 坐标。
  //
  // PosX is the X position of the Crafter that is being modified.
  //
  // Added: v1.20.50
  int32 PosX = 1;
  // PosY 是正在被修改的合成器 Y 坐标。
  //
  // PosY is the Y position of the Crafter that is being modified.
  //
  // Added: v1.20.50
  int32 PosY = 2;
  // PosZ 是正在被修改的合成器 Z 坐标。
  //
  // PosZ is the Z position of the Crafter that is being modified.
  //
  // Added: v1.20.50
  int32 PosZ = 3;
  // Slot 是被切换槽位的索引。该值应在 0 到 8 之间。
  //
  // Slot is the index of the slot that was toggled. This should be a value between 0 and 8.
  //
  // Added: v1.20.50
  // Go type: byte
  uint32 Slot = 4;
  // Disabled 是槽位的新状态。为 true 时槽位被禁用，为 false 时槽位被启用。
  //
  // Disabled is the new state of the slot. If true, the slot is disabled, if false, the slot is enabled.
  //
  // Added: v1.20.50
  bool Disabled = 5;
}

