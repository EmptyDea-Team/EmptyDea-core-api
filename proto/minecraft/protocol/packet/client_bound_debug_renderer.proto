syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.client_bound_debug_renderer;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "mgl32.proto";
import "packet_options.proto";

enum ClientBoundDebugRendererEnum {
  ClientBoundDebugRendererClear = 0;
  ClientBoundDebugRendererAddCube = 1;
}

// ClientBoundDebugRenderer 由服务器发送，用于在客户端侧生成一个带轮廓的立方体。
//
// ClientBoundDebugRenderer is sent by the server to spawn an outlined cube on client-side.
//
// Added: v1.16.210
message ClientBoundDebugRenderer {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDClientBoundDebugRenderer;
  // Type 是动作类型，应为上方常量之一。
  //
  // Type is the type of action. It is one of the constants above.
  //
  // Added: v1.16.210
  uint32 Type = 1;
  // Text 是显示在调试标记上方的文本。
  //
  // Text is the text that is displayed above the debug.
  //
  // Added: v1.16.210
  string Text = 2;
  // Position 是生成调试标记的位置。
  //
  // Position is the position to spawn the debug on.
  //
  // Added: v1.16.210
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Position = 3;
  // Red 是调试标记渲染 RGBA 颜色中的红色值，范围为 0 到 1。
  //
  // Red is the red value from the RGBA colour rendered on the debug. This value is in the range 0-1.
  //
  // Added: v1.16.210
  // Go type: float32
  float Red = 4;
  // Green 是调试标记渲染 RGBA 颜色中的绿色值，范围为 0 到 1。
  //
  // Green is the green value from the RGBA colour rendered on the debug. This value is in the range 0-1.
  //
  // Added: v1.16.210
  // Go type: float32
  float Green = 5;
  // Blue 是调试标记渲染 RGBA 颜色中的蓝色值，范围为 0 到 1。
  //
  // Blue is the blue value from the RGBA colour rendered on the debug. This value is in the range 0-1.
  //
  // Added: v1.16.210
  // Go type: float32
  float Blue = 6;
  // Alpha 是调试标记渲染 RGBA 颜色中的透明度值，范围为 0 到 1。
  //
  // Alpha is the alpha value from the RGBA colour rendered on the debug. This value is in the range 0-1.
  //
  // Added: v1.16.210
  // Go type: float32
  float Alpha = 7;
  // Duration 是调试标记在世界中持续的时间，以毫秒为单位。
  //
  // Duration is how long the debug will last in the world for. It is measured in milliseconds.
  //
  // Added: v1.16.210
  uint64 Duration = 8;
}

