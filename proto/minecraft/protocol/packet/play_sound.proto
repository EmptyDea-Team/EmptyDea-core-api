syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.play_sound;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "mgl32.proto";
import "packet_options.proto";

message PlaySoundOptionalUint64 {
  bool Present = 1;
  uint64 Value = 2;
}

// PlaySound 由服务器发送，用于向客户端播放声音。
// 部分声音只能使用该数据包开始播放，并且必须使用 StopSound 数据包停止。
//
// PlaySound is sent by the server to play a sound to the client. Some of the sounds may only be started using
// this packet and must be stopped using the StopSound packet.
//
// Added: v1.12
message PlaySound {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlaySound;
  // SoundName 是要播放的声音名称。
  //
  // SoundName is the name of the sound to play.
  //
  // Added: v1.12
  string SoundName = 1;
  // Position 是声音播放的位置。有些声音不依赖位置，此时会忽略该字段；
  // 但大多数声音会根据该位置与玩家位置的相对关系来确定播放方向。
  //
  // Position is the position at which the sound was played. Some sounds do not depend on a position,
  // which will then ignore it, but most of them will play with the direction based on the position compared
  // to the player's position.
  //
  // Added: v1.12
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Position = 2;
  // Volume 是要播放声音的相对音量。如果玩家离声音位置更远，听起来会更小。
  //
  // Volume is the relative volume of the sound to play. It will be less loud for the player if it is
  // farther away from the position of the sound.
  //
  // Added: v1.12
  // Go type: float32
  float Volume = 3;
  // Pitch 是要播放声音的音高。有些声音会完全忽略该字段，
  // 另一些声音则会按字段预期使用它来指定音高。
  //
  // Pitch is the pitch of the sound to play. Some sounds completely ignore this field, whereas others use
  // it to specify the pitch as the field is intended.
  //
  // Added: v1.12
  // Go type: float32
  float Pitch = 4;
  // Handle 是可选的声音句柄 ID。其用途目前未知，服务器不需要设置它。
  //
  // Handle is an optional sound handle ID. It is currently unknown what this is for, and is not required
  // to be set by servers.
  //
  // Added: v1.26.20
  // Go type: protocol.Optional[uint64]
  PlaySoundOptionalUint64 Handle = 5;
}

