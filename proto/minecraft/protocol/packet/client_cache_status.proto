syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.client_cache_status;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// ClientCacheStatus 由客户端在游戏开始时发送给服务器，用于告知服务器是否支持客户端侧 blob cache。
// Nintendo Switch 等客户端不支持该缓存，强行使用会失败。
//
// ClientCacheStatus is sent by the client to the server at the start of the game. It is sent to let the
// server know if it supports the client-side blob cache. Clients such as Nintendo Switch do not support the
// cache, and attempting to use it anyway will fail.
//
// Added: v1.12
message ClientCacheStatus {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDClientCacheStatus;
  // Enabled 指定 blob cache 是否启用。若为 false，服务器不应尝试使用 blob cache；
  // 若为 true，服务器可以使用，也可以选择不使用。
  //
  // Enabled specifies if the blob cache is enabled. If false, the server should not attempt to use the
  // blob cache. If true, it may do so, but it may also choose not to use it.
  //
  // Added: v1.12
  bool Enabled = 1;
}

