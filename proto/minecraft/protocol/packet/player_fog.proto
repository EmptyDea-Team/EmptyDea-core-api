syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.player_fog;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// PlayerFog 由服务器发送，用于渲染 Stack 中的不同雾效。雾效类型由资源包控制，
// 资源包可改变其渲染方式，也可以创建自定义雾效。
//
// PlayerFog is sent by the server to render the different fogs in the Stack. The types of fog are controlled
// by resource packs to change how they are rendered, and the ability to create custom fog.
//
// Added: v1.16.100
message PlayerFog {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlayerFog;
  // Stack 是发送给客户端的雾效标识符列表。雾效标识符示例包括 "minecraft:fog_ocean" 和 "minecraft:fog_hell"。
  //
  // Stack is a list of fog identifiers to be sent to the client. Examples of fog identifiers are
  // "minecraft:fog_ocean" and "minecraft:fog_hell".
  //
  // Added: v1.16.100
  // Go type: []string
  repeated string Stack = 1;
}

