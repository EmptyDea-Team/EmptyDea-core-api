syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.client_cache_blob_status;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// ClientCacheBlobStatus 是 blob 缓存协议的一部分。它由客户端发送，用类似 ACK 的系统告知服务器
// 客户端需要哪些 blob，以及已经拥有哪些 blob。
//
// ClientCacheBlobStatus is part of the blob cache protocol. It is sent by the client to let the server know
// what blobs it needs and which blobs it already has, in an ACK type system.
//
// Added: v1.12
message ClientCacheBlobStatus {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDClientCacheBlobStatus;
  // MissHashes 是客户端当前没有可用 blob 的 blob 哈希列表。服务器应尽快发送与这些哈希匹配的 blob。
  //
  // MissHashes is a list of blob hashes that the client does not have a blob available for. The server
  // should send the blobs matching these hashes as soon as possible.
  //
  // Added: v1.12
  // Go type: []uint64
  repeated uint64 MissHashes = 1;
  // HitHashes 是客户端已有可用 blob 的 blob 哈希列表。这里的 blob 哈希表示客户端已经拥有它们，
  // 服务器不再需要发送这些 blob。
  //
  // HitHashes is a list of blob hashes that the client has a blob available for. The blobs hashes here mean
  // that the client already has them: The server does not need to send the blobs anymore.
  //
  // Added: v1.12
  // Go type: []uint64
  repeated uint64 HitHashes = 2;
}

