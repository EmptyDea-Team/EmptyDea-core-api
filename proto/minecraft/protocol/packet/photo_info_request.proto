syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.photo_info_request;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// PhotoInfoRequest 由客户端发送，用于向服务器请求照片信息。
//
// PhotoInfoRequest is sent by the client to request photo information from the server.
//
// Deprecated: 该数据包自 1.19.80 起已弃用。
//
// Deprecated: This packet was deprecated in 1.19.80.
//
// Added: v1.17.40
message PhotoInfoRequest {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPhotoInfoRequest;
  // PhotoID 是照片 ID。
  //
  // PhotoID is the ID of the photo.
  //
  // Added: v1.17.40
  int64 PhotoID = 1;
}

