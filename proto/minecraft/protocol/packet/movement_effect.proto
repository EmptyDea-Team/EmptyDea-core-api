syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.movement_effect;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// MovementEffect 由服务器发送给客户端，用于更新特定移动效果，使客户端能够预测自身移动。
// 例如，滑翔时使用烟花会发送该数据包，告知客户端助推的准确持续时间。
//
// MovementEffect is sent by the server to the client to update specific movement effects to allow the client
// to predict its movement. For example, fireworks used during gliding will send this packet to tell the
// client the exact duration of the boost.
//
// Added: v1.21.40
message MovementEffect {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDMovementEffect;
  // EntityRuntimeID 是实体的运行时 ID。运行时 ID 在每个世界会话中唯一，
  // 数据包通常使用该运行时 ID 标识实体。
  //
  // EntityRuntimeID is the runtime ID of the entity. The runtime ID is unique for each world session, and
  // entities are generally identified in packets using this runtime ID.
  //
  // Added: v1.21.40
  uint64 EntityRuntimeID = 1;
  // Type 是正在更新的移动效果类型，它是上方常量之一。
  //
  // Type is the type of movement effect being updated. It is one of the constants found above.
  //
  // Added: v1.21.40
  int32 Type = 2;
  // Duration 是效果持续时间，单位为 tick。
  //
  // Duration is the duration of the effect, measured in ticks.
  //
  // Added: v1.21.40
  int32 Duration = 3;
  // Tick 是发送该数据包时的服务器 tick。它与 CorrectPlayerMovePrediction 配合使用。
  //
  // Tick is the server tick at which the packet was sent. It is used in relation to CorrectPlayerMovePrediction.
  //
  // Added: v1.21.40
  uint64 Tick = 4;
}

