syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.update_player_game_type;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// UpdatePlayerGameType 由服务器发送，用于更改玩家的游戏模式。
// 它在功能上与 SetPlayerGameType 数据包相同。
//
// UpdatePlayerGameType is sent by the server to change the game mode of a player. It is functionally
// identical to the SetPlayerGameType packet.
//
// Added: v1.16
message UpdatePlayerGameType {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDUpdatePlayerGameType;
  // GameType 是玩家的新游戏类型。它是 set_player_game_type.go 中的常量之一。
  // 部分游戏类型还需要在 UpdateAbilities 数据包中设置额外标志，才能获得完整功能。
  //
  // GameType is the new game type of the player. It is one of the constants that can be found in
  // set_player_game_type.go. Some of these game types require additional flags to be set in an
  // UpdateAbilities packet for the game mode to obtain its full functionality.
  //
  // Added: v1.16
  int32 GameType = 1;
  // PlayerUniqueID 是应更新游戏模式的玩家实体唯一 ID。
  // 如果该数据包带着另一名玩家的唯一 ID 发送给其他客户端，则不会产生效果。
  //
  // PlayerUniqueID is the entity unique ID of the player that should have its game mode updated. If this
  // packet is sent to other clients with the player unique ID of another player, nothing happens.
  //
  // Added: v1.16.0
  int64 PlayerUniqueID = 2;
  // Tick 是发送该数据包时的服务器 tick。它与 CorrectPlayerMovePrediction 配合使用。
  //
  // Tick is the server tick at which the packet was sent. It is used in relation to CorrectPlayerMovePrediction.
  //
  // Added: v1.20.80
  uint64 Tick = 3;
}

