syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.remove_actor;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// RemoveActor 由服务器发送，用于从客户端侧移除当前存在于世界中的实体。
// 如果客户端原本就看不到该实体，发送此数据包不会产生效果。
//
// RemoveActor is sent by the server to remove an entity that currently exists in the world from the client-
// side. Sending this packet if the client cannot already see this entity will have no effect.
//
// Added: v1.12
message RemoveActor {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDRemoveActor;
  // EntityUniqueID 是要移除的实体的唯一 ID。唯一 ID 在同一世界的不同会话之间保持一致，
  // 但大多数服务器会直接把实体运行时 ID 填入这个字段。
  //
  // EntityUniqueID is the unique ID of the entity to be removed. The unique ID is a value that remains
  // consistent across different sessions of the same world, but most servers simply fill the runtime ID
  // of the entity out for this field.
  //
  // Added: v1.12
  int64 EntityUniqueID = 1;
}

