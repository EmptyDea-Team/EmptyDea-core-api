syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.add_player;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "ability.proto";
import "entity_link.proto";
import "entity_metadata.proto";
import "entity_properties.proto";
import "item.proto";
import "mgl32.proto";
import "packet_options.proto";

// AddPlayer 由服务器发送给客户端，用于让玩家实体在客户端侧显示。
// 它是少数不能通过 AddActor 数据包发送的实体之一。
//
// AddPlayer is sent by the server to the client to make a player entity show up client-side. It is one of the
// few entities that cannot be sent using the AddActor packet.
//
// Added: v1.16
message AddPlayer {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDAddPlayer;
  // UUID 是玩家的 UUID。它与客户端在会话开始时通过 Login 数据包发送的 UUID 相同。
  // 具有该 UUID 的玩家必须存在于通过 PlayerList 数据包构建的玩家列表中，才会在游戏中显示。
  //
  // UUID is the UUID of the player. It is the same UUID that the client sent in the Login packet at the
  // start of the session. A player with this UUID must exist in the player list (built up using the
  // PlayerList packet), for it to show up in-game.
  //
  // Added: v1.16
  // Go type: uuid.UUID
  string UUID = 1;
  // Username 是玩家名称。该用户名会被设置为玩家的初始名称标签。
  //
  // Username is the name of the player. This username is the username that will be set as the initial
  // name tag of the player.
  //
  // Added: v1.16
  string Username = 2;
  // EntityUniqueID 是玩家的唯一 ID。唯一 ID 在同一世界的不同会话之间保持一致，
  // 但大多数服务器会直接把玩家运行时 ID 填入该字段。
  //
  // EntityUniqueID is the unique ID of the player. The unique ID is a value that remains consistent across
  // different sessions of the same world, but most servers simply fill the runtime ID of the player out for
  // this field.
  //
  // Added: v1.16
  // Removed: v1.19.10
  int64 EntityUniqueID = 3;
  // EntityRuntimeID 是玩家的运行时 ID。运行时 ID 在每个世界会话中唯一，
  // 数据包通常使用该运行时 ID 标识实体。
  //
  // EntityRuntimeID is the runtime ID of the player. The runtime ID is unique for each world session, and
  // entities are generally identified in packets using this runtime ID.
  //
  // Added: v1.16
  uint64 EntityRuntimeID = 4;
  // PlatformChatID 是聊天时仅为特定平台设置的标识符（推测仅用于 Nintendo Switch）。
  // 否则它为空字符串，并用于决定哪些玩家可以互相聊天。
  //
  // PlatformChatID is an identifier only set for particular platforms when chatting (presumably only for
  // Nintendo Switch). It is otherwise an empty string, and is used to decide which players are able to
  // chat with each other.
  //
  // Added: v1.2.13
  string PlatformChatID = 5;
  // Position 是生成玩家的位置。即使玩家在观察者当前不可见的距离外，
  // 观察者靠近后仍会看到该玩家。
  //
  // Position is the position to spawn the player on. If the player is on a distance that the viewer cannot
  // see it, the player will still show up if the viewer moves closer.
  //
  // Added: v1.16
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Position = 6;
  // Velocity 是玩家生成时的初始速度。该速度会触发客户端侧的玩家移动。
  //
  // Velocity is the initial velocity the player spawns with. This velocity will initiate client side
  // movement of the player.
  //
  // Added: v1.16
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Velocity = 7;
  // Pitch 是玩家的垂直旋转。正前方对应 pitch 为 0，以度为单位。
  //
  // Pitch is the vertical rotation of the player. Facing straight forward yields a pitch of 0. Pitch is
  // measured in degrees.
  //
  // Added: v1.16
  // Go type: float32
  float Pitch = 8;
  // Yaw 是玩家的水平旋转，同样以度为单位。
  //
  // Yaw is the horizontal rotation of the player. Yaw is also measured in degrees.
  //
  // Added: v1.16
  // Go type: float32
  float Yaw = 9;
  // HeadYaw 与 Yaw 类似，但它专门应用于玩家头部。
  // 如果 HeadYaw 与 Yaw 不同，表示玩家会转动头部。
  //
  // HeadYaw is the same as Yaw, except that it applies specifically to the head of the player. A different
  // value for HeadYaw than Yaw means that the player will have its head turned.
  //
  // Added: v1.16
  // Go type: float32
  float HeadYaw = 10;
  // HeldItem 是玩家手持的物品。玩家自身显示时，该物品会立即展示给观察者。
  // 不用说该字段意义有限，因为盔甲显示仍必须通过额外数据包发送。
  //
  // HeldItem is the item that the player is holding. The item is shown to the viewer as soon as the player
  // itself shows up. Needless to say that this field is rather pointless, as additional packets still must
  // be sent for armour to show up.
  //
  // Added: v1.16
  .mousetunnel.minecraft.protocol.item.ItemInstance HeldItem = 11;
  // GameType 是玩家的游戏类型。如果设为 GameTypeSpectator，玩家不会显示给观察者。
  //
  // GameType is the game type of the player. If set to GameTypeSpectator, the player will not be shown to viewers.
  //
  // Added: v1.18.30
  int32 GameType = 12;
  // EntityMetadata 是实体元数据映射，包含会改变玩家外观等行为的标志和数据属性。
  // 标志包括“着火”“疾跑”等，元数据值按属性键索引。
  //
  // EntityMetadata is a map of entity metadata, which includes flags and data properties that alter in
  // particular the way the player looks. Flags include ones such as 'on fire' and 'sprinting'.
  // The metadata values are indexed by their property key.
  //
  // Added: v1.16
  .mousetunnel.minecraft.protocol.entity_metadata.EntityMetadata EntityMetadata = 13;
  // EntityProperties 是该实体具有的属性列表。这些属性定义并改变实体的特定属性。
  //
  // EntityProperties is a list of properties that the entity inhibits. These properties define and alter specific
  // attributes of the entity.
  //
  // Added: v1.19.40
  .mousetunnel.minecraft.protocol.entity_properties.EntityProperties EntityProperties = 14;
  // LegacyAbilityFlags 是一组指定玩家特定属性的标志，例如是否可飞行或穿过方块。
  //
  // LegacyAbilityFlags is a set of flags that specify certain properties of the player, such as whether it can fly
  // and/or move through blocks.
  //
  // Added: v1.16
  // Removed: v1.19.10
  uint32 LegacyAbilityFlags = 15;
  // LegacyCommandPermissionLevel 指定能力数据移入独立结构前玩家允许执行哪些命令。
  //
  // LegacyCommandPermissionLevel specifies what commands a player is allowed to execute before ability data was moved
  // into its own structure.
  //
  // Added: v1.16
  // Removed: v1.19.10
  uint32 LegacyCommandPermissionLevel = 16;
  // LegacyActionPermissions 是一组标志，用于指定玩家允许执行的动作。
  //
  // LegacyActionPermissions is a set of flags that specify actions that the player is allowed to undertake.
  //
  // Added: v1.16
  // Removed: v1.19.10
  uint32 LegacyActionPermissions = 17;
  // LegacyPermissionLevel 是玩家在通过 PlayerList 数据包构建的玩家列表中显示的权限等级。
  //
  // LegacyPermissionLevel is the permission level of the player as it shows up in the player list built up using the
  // PlayerList packet.
  //
  // Added: v1.16
  // Removed: v1.19.10
  uint32 LegacyPermissionLevel = 18;
  // LegacyCustomStoredPermissions 是已被 AbilityData 取代的旧权限字段。
  //
  // LegacyCustomStoredPermissions is an old permission field that was replaced by AbilityData.
  //
  // Added: v1.16
  // Removed: v1.19.10
  uint32 LegacyCustomStoredPermissions = 19;
  // AbilityData 表示玩家能力的各种数据，例如能力层或权限。
  //
  // AbilityData represents various data about the abilities of a player, such as ability layers or permissions.
  //
  // Added: v1.19.10
  .mousetunnel.minecraft.protocol.ability.AbilityData AbilityData = 20;
  // EntityLinks 是玩家当前激活的实体链接列表。这些链接会改变玩家首次生成时的显示方式，
  // 例如显示为正在骑乘某个实体。设置这些链接对新观察者看到玩家正骑乘另一个实体很重要。
  //
  // EntityLinks is a list of entity links that are currently active on the player. These links alter the
  // way the player shows up when first spawned in terms of it shown as riding an entity. Setting these
  // links is important for new viewers to see the player is riding another entity.
  //
  // Added: v1.16
  // Go type: []protocol.EntityLink
  repeated .mousetunnel.minecraft.protocol.entity_link.EntityLink EntityLinks = 21;
  // DeviceID 是玩家设备存储中某个文件里设置的设备 ID。
  // 它可以被自由更改，因此不应依赖它做任何判断。
  //
  // DeviceID is the device ID set in one of the files found in the storage of the device of the player. It
  // may be changed freely, so it should not be relied on for anything.
  //
  // Added: v1.16
  string DeviceID = 22;
  // BuildPlatform 是即将被添加玩家的构建平台或设备 OS，
  // 也就是其加入时在 Login 数据包中发送的值。
  //
  // BuildPlatform is the build platform/device OS of the player that is about to be added, as it sent in
  // the Login packet when joining.
  //
  // Added: v1.16
  int32 BuildPlatform = 23;
  // NetEaseUnknown1 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown1 is an extra NetEase add player field.
  //
  // Added: NetEase.
  string NetEaseUnknown1 = 24;
  // NetEaseUnknown2 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown2 is an extra NetEase add player field.
  //
  // Added: NetEase.
  string NetEaseUnknown2 = 25;
  // NetEaseUnknown3 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown3 is an extra NetEase add player field.
  //
  // Added: NetEase.
  bool NetEaseUnknown3 = 26;
  // NetEaseUnknown4 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown4 is an extra NetEase add player field.
  //
  // Added: NetEase.
  bool NetEaseUnknown4 = 27;
  // NetEaseUnknown5 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown5 is an extra NetEase add player field.
  //
  // Added: NetEase.
  uint32 NetEaseUnknown5 = 28;
  // NetEaseUnknown6 是网易额外的添加玩家字段。
  //
  // NetEaseUnknown6 is an extra NetEase add player field.
  //
  // Added: NetEase.
  int64 NetEaseUnknown6 = 29;
}

