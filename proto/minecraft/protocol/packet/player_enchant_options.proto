syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.player_enchant_options;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "enchant.proto";
import "packet_options.proto";

// PlayerEnchantOptions 由服务器发送，用于在用户打开附魔台并放入物品时更新显示的附魔选项。
// 它允许服务器决定玩家可以选择哪些附魔。
// 每次附魔台槽位更新都应发送一次 PlayerEnchantOptions 数据包。原版服务器会在玩家打开附魔台时
// 发送一个空的 PlayerEnchantOptions 数据包（附魔台槽位为空气），并在放入可附魔物品后发送包含实际附魔的数据包。
//
// PlayerEnchantOptions is sent by the server to update the enchantment options displayed when the user opens
// the enchantment table and puts an item in. It allows the server to decide on the enchantments that can be
// selected by the player.
// The PlayerEnchantOptions packet should be sent once for every slot update of the enchantment table. The
// vanilla server sends an empty PlayerEnchantOptions packet when the player opens the enchantment table
// (air is present in the enchantment table slot) and sends the packet with actual enchantments in it when
// items are put in that can have enchantments.
//
// Added: v1.16
message PlayerEnchantOptions {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlayerEnchantOptions;
  // Options 是放入附魔台的物品可用的附魔选项列表。
  //
  // Options is a list of possible enchantment options for the item that was put into the enchantment table.
  //
  // Added: v1.16
  // Go type: []protocol.EnchantmentOption
  repeated .mousetunnel.minecraft.protocol.enchant.EnchantmentOption Options = 1;
}

