syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.lesson_progress;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

enum LessonActionEnum {
  LessonActionStart = 0;
  LessonActionComplete = 1;
  LessonActionRestart = 2;
}

// LessonProgress 是服务器发送给客户端的数据包，用于通知客户端某个课程的进度更新。
// 该数据包仅在 Minecraft 教育版中生效。
//
// LessonProgress is a packet sent by the server to the client to inform the client of updated progress on a lesson.
// This packet only functions on the Minecraft: Education Edition version of the game.
//
// Added: v1.18.30
message LessonProgress {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDLessonProgress;
  // Identifier 是正在推进进度的课程标识符。
  //
  // Identifier is the identifier of the lesson that is being progressed.
  //
  // Added: v1.18.30
  string Identifier = 1;
  // Action 是客户端应执行以显示进度的操作，它是上方定义的常量之一。
  //
  // Action is the action the client should perform to show progress. This is one of the constants defined above.
  //
  // Added: v1.18.30
  int32 Action = 2;
  // Score 是客户端显示进度时应使用的分数。
  //
  // Score is the score the client should use when displaying the progress.
  //
  // Added: v1.18.30
  int32 Score = 3;
}

