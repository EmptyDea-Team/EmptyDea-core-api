syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.resource_pack_stack;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "experiments.proto";
import "packet_options.proto";
import "resource_pack.proto";

// ResourcePackStack 由服务器发送，用于告知客户端资源包和行为包应被应用（并下载）的顺序。
//
// ResourcePackStack is sent by the server to send the order in which resource packs and behaviour packs
// should be applied (and downloaded) by the client.
//
// Added: v1.11.1
message ResourcePackStack {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDResourcePackStack;
  // TexturePackRequired 指定客户端是否必须接受服务器提供的材质包才能加入服务器。
  // 如果设为 true，客户端可以选择下载资源包并加入，或完全退出。行为包永远不需要下载。
  //
  // TexturePackRequired specifies if the client must accept the texture packs the server has in order to
  // join the server. If set to true, the client gets the option to either download the resource packs and
  // join, or quit entirely. Behaviour packs never have to be downloaded.
  //
  // Added: v1.11.1
  bool TexturePackRequired = 1;
  // BehaviourPacks 是客户端加入服务器前需要下载的行为包列表。
  // 所有这些行为包会一起应用，其顺序不一定重要。
  //
  // BehaviourPacks is a list of behaviour packs that the client needs to download before joining the server.
  // All of these behaviour packs will be applied together, and the order does not necessarily matter.
  //
  // Added: v1.11.1
  // Removed: v1.21.130.28
  // Go type: []protocol.StackResourcePack
  repeated .mousetunnel.minecraft.protocol.resource_pack.StackResourcePack BehaviourPacks = 2;
  // TexturePacks 是客户端加入服务器前需要下载的材质包列表。
  // 这些材质包的顺序指定客户端侧应用它们的顺序；列表中的第一个会最先应用。
  //
  // TexturePacks is a list of texture packs that the client needs to download before joining the server.
  // The order of these texture packs specifies the order that they are applied in on the client side. The
  // first in the list will be applied first.
  //
  // Added: v1.11.1
  // Go type: []protocol.StackResourcePack
  repeated .mousetunnel.minecraft.protocol.resource_pack.StackResourcePack TexturePacks = 3;
  // Experimental 指定旧协议中是否应为该包栈启用实验性玩法。
  //
  // Experimental specifies if experimental gameplay should be enabled for the pack stack in legacy protocols.
  //
  // Added: v1.8.0, Removed: v1.13.0
  bool Experimental = 4;
  // BaseGameVersion 是客户端应将其资源包栈设置到的原版版本。
  //
  // BaseGameVersion is the vanilla version that the client should set its resource pack stack to.
  //
  // Added: v1.13.0
  string BaseGameVersion = 5;
  // Experiments 保存玩家生成所在世界中启用或禁用的实验列表。
  // 目前不清楚为什么实验同时在这里和 StartGame 数据包中发送。
  //
  // Experiments holds a list of experiments that are either enabled or disabled in the world that the
  // player spawns in.
  // It is not clear why experiments are sent both here and in the StartGame packet.
  //
  // Added: v1.16.100
  // Go type: []protocol.ExperimentData
  repeated .mousetunnel.minecraft.protocol.experiments.ExperimentData Experiments = 6;
  // ExperimentsPreviouslyToggled 指定该世界之前是否切换过任何实验，
  // 它可能用于某种指标统计。
  //
  // ExperimentsPreviouslyToggled specifies if any experiments were previously toggled in this world. It is
  // probably used for some kind of metrics.
  //
  // Added: v1.16.100
  bool ExperimentsPreviouslyToggled = 7;
  // IncludeEditorPacks 指定连接到编辑器世界时，资源包栈中是否应包含原版编辑器包。
  //
  // IncludeEditorPacks specifies if vanilla editor packs should be included in the resource pack stack when
  // connecting to an editor world.
  //
  // Added: v1.20.80
  // Changed: v1.21.130.28, retained after behaviour packs were removed from this packet.
  bool IncludeEditorPacks = 8;
  // NetEaseUnknownBehaviourPacks 是网易额外的行为包栈。
  //
  // NetEaseUnknownBehaviourPacks is an extra NetEase behaviour pack stack.
  //
  // Added: NetEase.
  // Go type: []protocol.StackResourcePack
  repeated .mousetunnel.minecraft.protocol.resource_pack.StackResourcePack NetEaseUnknownBehaviourPacks = 9;
  // NetEaseUnknownTexturePacks 是网易额外的材质包栈。
  //
  // NetEaseUnknownTexturePacks is an extra NetEase texture pack stack.
  //
  // Added: NetEase.
  // Go type: []protocol.StackResourcePack
  repeated .mousetunnel.minecraft.protocol.resource_pack.StackResourcePack NetEaseUnknownTexturePacks = 10;
}

