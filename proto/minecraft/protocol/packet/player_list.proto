syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.player_list;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "netease.proto";
import "packet_options.proto";
import "player.proto";

enum PlayerListActionEnum {
  PlayerListActionAdd = 0;
  PlayerListActionRemove = 1;
}

// PlayerList 由服务器发送，用于更新游戏内菜单界面中的客户端侧玩家列表。
// 如果数据包中写入了正确的 XUID，它会显示每个玩家的图标。
// 发送 AddPlayer 数据包时必须发送 PlayerList 数据包；如果玩家没有被加入玩家列表，
// 客户端不会显示该玩家，因为皮肤等多个玩家属性都从玩家列表中取得。
//
// PlayerList is sent by the server to update the client-side player list in the in-game menu screen. It shows
// the icon of each player if the correct XUID is written in the packet.
// Sending the PlayerList packet is obligatory when sending an AddPlayer packet. The added player will not
// show up to a client if it has not been added to the player list, because several properties of the player
// are obtained from the player list, such as the skin.
//
// Added: v1.11.1
message PlayerList {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlayerList;
  // ActionType 是要对玩家列表执行的动作。后续条目指定要从玩家列表添加或移除哪些条目。
  //
  // ActionType is the action to execute upon the player list. The entries that follow specify which entries
  // are added or removed from the player list.
  //
  // Added: v1.11.1
  // Go type: byte
  uint32 ActionType = 1;
  // Entries 是所有应从玩家列表添加或移除的玩家列表条目，
  // 具体行为取决于设置的 ActionType。
  //
  // Entries is a list of all player list entries that should be added/removed from the player list,
  // depending on the ActionType set.
  //
  // Added: v1.11.1
  // Changed: v1.14.60, add entries have their trusted skin booleans appended after the entry list.
  // Go type: []protocol.PlayerListEntry
  repeated .mousetunnel.minecraft.protocol.player.PlayerListEntry Entries = 2;
  // NetEaseUnknown1 是网易额外的玩家列表数据。
  //
  // NetEaseUnknown1 is extra NetEase player list data.
  //
  // Added: NetEase.
  // Go type: []protocol.NetEaseUnknownPlayerListEntry
  repeated .mousetunnel.minecraft.protocol.netease.NetEaseUnknownPlayerListEntry NetEaseUnknown1 = 3;
  // NetEaseUnknown2 是网易额外的玩家列表数据。
  //
  // NetEaseUnknown2 is extra NetEase player list data.
  //
  // Added: NetEase.
  // Go type: []protocol.NetEaseUnknownPlayerListEntry
  repeated .mousetunnel.minecraft.protocol.netease.NetEaseUnknownPlayerListEntry NetEaseUnknown2 = 4;
  // NetEaseUnknown3 是网易额外的玩家列表数据。
  //
  // NetEaseUnknown3 is extra NetEase player list data.
  //
  // Added: NetEase.
  // Go type: []string
  repeated string NetEaseUnknown3 = 5;
  // NetEaseGrowthLevels 是网易额外的玩家列表成长等级数据。
  //
  // NetEaseGrowthLevels is extra NetEase player list growth level data.
  //
  // Added: NetEase.
  // Go type: []uint32
  repeated uint32 NetEaseGrowthLevels = 6;
  // NetEaseUnknown4 是网易额外的玩家列表数据。
  //
  // NetEaseUnknown4 is extra NetEase player list data.
  //
  // Added: NetEase.
  // Go type: []bool
  repeated bool NetEaseUnknown4 = 7;
}

