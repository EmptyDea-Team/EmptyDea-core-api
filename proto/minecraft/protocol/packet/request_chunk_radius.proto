syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.request_chunk_radius;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// RequestChunkRadius 由客户端发送给服务器，用于告知服务器其在设置中配置的区块视距。
// 服务器可以用 ChunkRadiusUpdated 数据包响应请求的区块视距，也可以选择返回不同的区块视距。
//
// RequestChunkRadius is sent by the client to the server to update the server on the chunk view radius that
// it has set in the settings. The server may respond with a ChunkRadiusUpdated packet with either the chunk
// radius requested, or a different chunk radius if the server chooses so.
//
// Added: v1.12
message RequestChunkRadius {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDRequestChunkRadius;
  // ChunkRadius 是请求的区块视距。该值始终是玩家设置中的值。
  //
  // ChunkRadius is the requested chunk radius. This value is always the value set in the settings of the
  // player.
  //
  // Added: v1.12
  int32 ChunkRadius = 1;
  // MaxChunkRadius 是玩家希望接收的最大区块视距。客户端发送该字段的原因目前未知。
  //
  // MaxChunkRadius is the maximum chunk radius that the player wants to receive. The reason for the client sending this
  // is currently unknown.
  //
  // Added: v1.19.80
  // Go type: uint8
  uint32 MaxChunkRadius = 2;
}

