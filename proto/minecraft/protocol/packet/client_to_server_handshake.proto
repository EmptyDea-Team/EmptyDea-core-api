syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.client_to_server_handshake;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// ClientToServerHandshake 由客户端发送，用于响应服务器发送的 ServerToClientHandshake 数据包。
// 它是登录握手中的第一个加密数据包，用于确认客户端侧加密已正确初始化。
//
// ClientToServerHandshake is sent by the client in response to a ServerToClientHandshake packet sent by the
// server. It is the first encrypted packet in the login handshake and serves as a confirmation that
// encryption is correctly initialised client side.
//
// Added: v1.11.1
message ClientToServerHandshake {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDClientToServerHandshake;
}

