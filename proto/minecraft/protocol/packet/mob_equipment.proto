syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.mob_equipment;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "item.proto";
import "packet_options.proto";

// MobEquipment 可由客户端发送给服务器，也可由服务器发送给客户端，
// 用于让另一方知道实体当前持有的新物品。它也用于显示僵尸等实体手中的物品。
//
// MobEquipment is sent by the client to the server and the server to the client to make the other side
// aware of the new item that an entity is holding. It is used to show the item in the hand of entities such
// as zombies too.
//
// Added: v1.12
message MobEquipment {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDMobEquipment;
  // EntityRuntimeID 是实体的运行时 ID。运行时 ID 在每个世界会话中唯一，
  // 数据包通常使用该运行时 ID 标识实体。
  //
  // EntityRuntimeID is the runtime ID of the entity. The runtime ID is unique for each world session, and
  // entities are generally identified in packets using this runtime ID.
  //
  // Added: v1.12
  uint64 EntityRuntimeID = 1;
  // NewItem 是发送 MobEquipment 数据包后持有的新物品。
  // 该实体会向接收该数据包的玩家显示为持有此物品。
  //
  // NewItem is the new item held after sending the MobEquipment packet. The entity will be shown holding
  // that item to the player it was sent to.
  //
  // Added: v1.12, Changed: v1.26.20, encoded as ItemInstanceNew.
  .mousetunnel.minecraft.protocol.item.ItemInstance NewItem = 2;
  // InventorySlot 是物品栏中被持有的槽位。它与 HotBarSlot 相同，仅为向后兼容而保留。
  //
  // InventorySlot is the slot in the inventory that was held. This is the same as HotBarSlot, and only
  // remains for backwards compatibility.
  //
  // Added: v1.12
  // Go type: byte
  uint32 InventorySlot = 3;
  // HotBarSlot 是快捷栏中被持有的槽位。它与 InventorySlot 相同，后者仅用于向后兼容。
  //
  // HotBarSlot is the slot in the hot bar that was held. It is the same as InventorySlot, which is only
  // there for backwards compatibility purposes.
  //
  // Added: v1.12
  // Go type: byte
  uint32 HotBarSlot = 4;
  // WindowID 是装备物品发生变化的窗口 ID。它通常是普通物品栏的窗口 ID，
  // 但也可能是其他窗口，例如副手。
  //
  // WindowID is the window ID of the window that had its equipped item changed. This is usually the window
  // ID of the normal inventory, but may also be something else, for example with the off hand.
  //
  // Added: v1.12
  // Go type: byte
  uint32 WindowID = 5;
}

