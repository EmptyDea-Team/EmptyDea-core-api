syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.player_update_entity_overrides;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

enum PlayerUpdateEntityOverridesTypeEnum {
  PlayerUpdateEntityOverridesTypeClearAll = 0;
  PlayerUpdateEntityOverridesTypeRemove = 1;
  PlayerUpdateEntityOverridesTypeInt = 2;
  PlayerUpdateEntityOverridesTypeFloat = 3;
}

// PlayerUpdateEntityOverrides 由服务器发送，用于单独修改实体的属性。
//
// PlayerUpdateEntityOverrides is sent by the server to modify an entity's properties individually.
//
// Added: v1.21.70
message PlayerUpdateEntityOverrides {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDPlayerUpdateEntityOverrides;
  // EntityUniqueID 是实体的唯一 ID。唯一 ID 会在同一世界的不同会话之间保持一致，
  // 但大多数服务器会直接把实体运行时 ID 填入该字段。
  //
  // EntityUniqueID is the unique ID of the entity. The unique ID is a value that remains consistent across
  // different sessions of the same world, but most servers simply fill the runtime ID of the entity out for
  // this field.
  //
  // Added: v1.21.70
  int64 EntityUniqueID = 1;
  // PropertyIndex 是要修改的属性索引。该索引在实体的每个属性中都是唯一的。
  //
  // PropertyIndex is the index of the property to modify. The index is unique for each property of an entity.
  //
  // Added: v1.21.70
  uint32 PropertyIndex = 2;
  // Type 是要对该属性执行的操作类型，它是上方常量之一。
  //
  // Type is the type of action to perform with the property. It is one of the constants above.
  //
  // Added: v1.21.70
  // Go type: byte
  uint32 Type = 3;
  // IntValue 是该属性的新整数值。仅当 Type 设置为 PlayerUpdateEntityOverridesTypeInt 时使用。
  //
  // IntValue is the new integer value of the property. It is only used when Type is set to
  // PlayerUpdateEntityOverridesTypeInt.
  //
  // Added: v1.21.70
  int32 IntValue = 4;
  // FloatValue 是该属性的新浮点值。仅当 Type 设置为 PlayerUpdateEntityOverridesTypeFloat 时使用。
  //
  // FloatValue is the new float value of the property. It is only used when Type is set to
  // PlayerUpdateEntityOverridesTypeFloat.
  //
  // Added: v1.21.70
  // Go type: float32
  float FloatValue = 5;
}

