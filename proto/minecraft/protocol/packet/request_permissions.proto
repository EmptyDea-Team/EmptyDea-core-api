syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.request_permissions;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "packet_options.proto";

// RequestPermissions 是客户端发送给服务器的数据包，用于请求客户端当前没有的权限。
// 在原版 Minecraft 中，只有操作员和主机可以发送它。
//
// RequestPermissions is a packet sent from the client to the server to request permissions that the client does not
// currently have. It can only be sent by operators and host in vanilla Minecraft.
//
// Added: v1.19
message RequestPermissions {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDRequestPermissions;
  // EntityUniqueID 是玩家的唯一 ID。唯一 ID 在整个世界中唯一，并经常用于数据包。
  // 大多数服务器会发送与 EntityRuntimeID 相同的 EntityUniqueID。
  //
  // EntityUniqueID is the unique ID of the player. The unique ID is unique for the entire world and is
  // often used in packets. Most servers send an EntityUniqueID equal to the EntityRuntimeID.
  //
  // Added: v1.19
  int64 EntityUniqueID = 1;
  // PermissionLevel 是玩家当前的权限等级，它是 AdventureSettings 数据包中的常量之一。
  //
  // PermissionLevel is the current permission level of the player. This is one of the constants that may be found
  // in the AdventureSettings packet.
  //
  // Added: v1.19
  int32 PermissionLevel = 2;
  // RequestedPermissions 包含请求的权限标志。
  //
  // RequestedPermissions contains the requested permission flags.
  //
  // Added: v1.19
  // Go type: uint16
  uint32 RequestedPermissions = 3;
}

