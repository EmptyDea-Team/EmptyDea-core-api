syntax = "proto3";

package mousetunnel.minecraft.protocol.packet.move_player;
option go_package = "github.com/EmptyDea-Team/EmptyDea-core-api/pb/minecraft/protocol/packet;packet";

import "mgl32.proto";
import "packet_options.proto";

enum MoveModeEnum {
  MoveModeNormal = 0;
  MoveModeReset = 1;
  MoveModeTeleport = 2;
  MoveModeRotation = 3;
}

enum TeleportCauseEnum {
  TeleportCauseUnknown = 0;
  TeleportCauseProjectile = 1;
  TeleportCauseChorusFruit = 2;
  TeleportCauseCommand = 3;
  TeleportCauseBehaviour = 4;
}

// MovePlayer 由玩家发送，用于将自己的移动发送给服务器；
// 也由服务器发送，用于向其他玩家更新玩家实体的移动。
//
// MovePlayer is sent by players to send their movement to the server, and by the server to update the
// movement of player entities to other players.
//
// Added: v1.11.1
message MovePlayer {
  option (mousetunnel.minecraft.protocol.packet_options.packet_id) = IDMovePlayer;
  // EntityRuntimeID 是玩家的运行时 ID。运行时 ID 在每个世界会话中唯一，
  // 数据包通常使用该运行时 ID 标识实体。
  //
  // EntityRuntimeID is the runtime ID of the player. The runtime ID is unique for each world session, and
  // entities are generally identified in packets using this runtime ID.
  //
  // Added: v1.11.1
  uint64 EntityRuntimeID = 1;
  // Position 是生成玩家的位置。即使玩家在观察者当前不可见的距离外，
  // 观察者靠近后仍会看到该玩家。
  //
  // Position is the position to spawn the player on. If the player is on a distance that the viewer cannot
  // see it, the player will still show up if the viewer moves closer.
  //
  // Added: v1.11.1
  // Go type: mgl32.Vec3
  .mousetunnel.minecraft.protocol.mgl32.Vec3 Position = 2;
  // Pitch 是玩家的垂直旋转。正前方对应 pitch 为 0，以度为单位。
  //
  // Pitch is the vertical rotation of the player. Facing straight forward yields a pitch of 0. Pitch is
  // measured in degrees.
  //
  // Added: v1.11.1
  // Go type: float32
  float Pitch = 3;
  // Yaw 是玩家的水平旋转，同样以度为单位。
  //
  // Yaw is the horizontal rotation of the player. Yaw is also measured in degrees.
  //
  // Added: v1.11.1
  // Go type: float32
  float Yaw = 4;
  // HeadYaw 与 Yaw 类似，但它专门应用于玩家头部。
  // 如果 HeadYaw 与 Yaw 不同，表示玩家会转动头部。
  //
  // HeadYaw is the same as Yaw, except that it applies specifically to the head of the player. A different
  // value for HeadYaw than Yaw means that the player will have its head turned.
  //
  // Added: v1.11.1
  // Go type: float32
  float HeadYaw = 5;
  // Mode 是移动模式，用于指定玩家移动应如何展示给其他玩家。
  // 它应为上方常量之一。
  //
  // Mode is the mode of the movement. It specifies the way the player's movement should be shown to other
  // players. It is one of the constants above.
  //
  // Added: v1.11.1
  // Go type: byte
  uint32 Mode = 6;
  // OnGround 指定玩家是否被视为位于地面上。注意代理或作弊客户端可以伪造该值始终为 true，
  // 因此不应无条件信任。
  //
  // OnGround specifies if the player is considered on the ground. Note that proxies or hacked clients could
  // fake this to always be true, so it should not be taken for granted.
  //
  // Added: v1.11.1
  bool OnGround = 7;
  // RiddenEntityRuntimeID 是玩家当前可能骑乘实体的运行时 ID。
  // 如果没有骑乘实体，应留为 0。
  //
  // RiddenEntityRuntimeID is the runtime ID of the entity that the player might currently be riding. If not
  // riding, this should be left 0.
  //
  // Added: v1.11.1
  uint64 RiddenEntityRuntimeID = 8;
  // TeleportCause 仅在 Mode 为 MoveModeTeleport 时写入，用于指定传送原因，
  // 应为上方常量之一。
  //
  // TeleportCause is written only if Mode is MoveModeTeleport. It specifies the cause of the teleportation,
  // which is one of the constants above.
  //
  // Added: v1.11.1
  int32 TeleportCause = 9;
  // TeleportSourceEntityType 是导致传送的实体类型，例如末影珍珠。
  //
  // TeleportSourceEntityType is the entity type that caused the teleportation, for example an ender pearl.
  //
  // Added: v1.11.1
  int32 TeleportSourceEntityType = 10;
  // Tick 是发送该数据包时的服务器刻。它与 CorrectPlayerMovePrediction 相关联使用。
  //
  // Tick is the server tick at which the packet was sent. It is used in relation to CorrectPlayerMovePrediction.
  //
  // Added: v1.16.100
  uint64 Tick = 11;
}

